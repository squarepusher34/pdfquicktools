<!DOCTYPE html>
<html lang="en">  
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#15172b">

<title>JPG → PDF | PDFQuickTools</title>

<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6722827238956891" crossorigin="anonymous"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
/* ---------- tokens ---------- */
:root{
    --ink:#15172b;
    --paper:#faf7f2;
    --card:#ffffff;
    --coral:#ff5a4e;
    --coral-deep:#df4538;
    --blue:#3b6fed;
    --amber:#f2a93b;
    --amber-deep:#c97f12;
    --muted:#716c63;
    --border:#e8e2d8;
    --success:#7CF29C;
    --success-ink:#0f5132;

    --display:'Fraunces', serif;
    --body:'Inter', system-ui, sans-serif;
    --mono:'IBM Plex Mono', monospace;

    --container:680px;
    --shadow-soft:0 10px 28px -14px rgba(21,23,43,.16);
    --shadow-lift:0 20px 40px -16px rgba(21,23,43,.22);
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
    margin:0;
    font-family:var(--body);
    background:var(--paper);
    background-image:radial-gradient(circle at 1px 1px, rgba(21,23,43,.05) 1px, transparent 0);
    background-size:16px 16px;
    color:var(--ink);
    line-height:1.6;
}

a{color:inherit;text-decoration:none;}

*:focus-visible{outline:2px solid var(--blue);outline-offset:3px;border-radius:6px;}

/* ---------- header ---------- */
header{
    position:sticky;top:0;z-index:50;
    background:rgba(21,23,43,.94);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,.08);
}
.header-inner{
    max-width:1180px;margin:0 auto;padding:14px 24px;
    display:flex;justify-content:space-between;align-items:center;gap:16px;
}
.brand{
    display:flex;align-items:center;gap:10px;
    font-family:var(--display);font-weight:600;font-size:18px;color:#fff;
    letter-spacing:-.01em;
}
.brand-mark{
    font-family:var(--mono);font-size:10px;font-weight:600;color:#fff;
    background:linear-gradient(160deg,var(--coral),var(--coral-deep));
    padding:6px 7px 5px;border-radius:5px;letter-spacing:.03em;
    clip-path:polygon(0 0,75% 0,100% 35%,100% 100%,0 100%);
}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{
    color:rgba(255,255,255,.82);font-size:14px;font-weight:500;
    padding:8px 12px;border-radius:8px;transition:background .2s,color .2s;
}
.nav-links a:hover{background:rgba(255,255,255,.08);color:#fff;}

/* ---------- main container ---------- */
.container{
    max-width:var(--container);
    margin:80px auto;
    padding-inline:24px;
}

/* ---------- ticket card ---------- */
.ticket{
    position:relative;
    background:var(--card);
    border-radius:0 0 10px 10px;
    padding:40px 32px 32px;
    box-shadow:var(--shadow-soft);
    clip-path:polygon(
        0% 0%, 100% 0%, 
        100% 98%, 96% 100%, 92% 98%, 88% 100%, 84% 98%, 80% 100%, 76% 98%, 72% 100%, 68% 98%, 64% 100%, 60% 98%, 56% 100%, 52% 98%, 48% 100%, 44% 98%, 40% 100%, 36% 98%, 32% 100%, 28% 98%, 24% 100%, 20% 98%, 16% 100%, 12% 98%, 8% 100%, 4% 98%, 0% 100%
    );
}

.eyebrow{
    font-family:var(--mono);font-size:.72rem;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;color:var(--blue);margin:0 0 12px;
    text-align:center;
}

h2{
    font-family:var(--display);
    font-weight:600;
    font-size:clamp(1.8rem,4vw,2.4rem);
    letter-spacing:-.01em;
    margin:0 0 8px;
    text-align:center;
}

.lede{
    color:var(--muted);
    font-size:1rem;
    margin:0 0 32px;
    text-align:center;
}

/* ---------- input file zone ---------- */
input[type="file"]{
    width:100%;
    padding:24px 16px;
    border:2px dashed var(--border);
    border-radius:12px;
    background:var(--paper);
    font-family:var(--body);
    font-size:14px;
    color:var(--muted);
    cursor:pointer;
    transition:border-color .2s, background .2s;
    margin-bottom:20px;
}

input[type="file"]:hover{
    border-color:var(--coral);
    background:rgba(255,90,78,.02);
}

/* ---------- preview gallery ---------- */
#preview{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:8px;
    margin-bottom:24px;
    justify-content:center;
}

#preview img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:8px;
    border:1px solid var(--border);
    box-shadow: 0 2px 8px rgba(21,23,43,.04);
}

/* ---------- button ---------- */
button{
    width:100%;
    padding:16px;
    background:linear-gradient(160deg, var(--coral), var(--coral-deep));
    color:white;
    border:none;
    border-radius:12px;
    font-family:var(--body);
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(223,69,56,.2);
    transition:transform .2s, box-shadow .2s;
}

button:hover{
    transform:translateY(-1px);
    box-shadow:0 6px 16px rgba(223,69,56,.3);
}

button:active{
    transform:translateY(1px);
}

/* ---------- download trigger ---------- */
#download{
    display:none;
    margin-top:20px;
    padding:14px;
    text-align:center;
    font-weight:600;
    font-size:15px;
    background:var(--success);
    color:var(--success-ink);
    border-radius:10px;
    box-shadow:0 4px 12px rgba(124,242,156,.2);
    transition:transform .2s;
}
#download:hover{
    transform:translateY(-1px);
}

/* ---------- perforation ---------- */
.perforation{
    height:3px;margin:32px 0 24px;
    background-image:radial-gradient(circle,var(--paper) 1.6px,transparent 1.7px);
    background-size:11px 100%;background-repeat:repeat-x;
}

/* ---------- footer element ---------- */
.back{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:100%;
    font-size:14px;
    color:var(--muted);
    font-weight:500;
    transition:color .2s;
}

.back:hover{
    color:var(--ink);
}
</style>
</head>

<body>

<header>
    <div class="header-inner">
        <a href="/" class="brand">
            <span class="brand-mark">PDF</span> PDFQuickTools
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </div>
</header>

<div class="container">

    <div class="ticket">
        <div class="eyebrow">IMAGE CONVERTER</div>
        <h2>JPG → PDF Converter</h2>
        <p class="lede">Convert your images into a single PDF document</p>

        <input type="file" id="images" accept="image/*" multiple />

        <div id="preview"></div>

        <button onclick="convert()">Create PDF</button>

        <a id="download">Download PDF ✔</a>

        <div class="perforation"></div>
        
        <a class="back" href="/index.html">← Home</a>
    </div>

</div>

<script>
const imagesInput = document.getElementById("images");
const preview = document.getElementById("preview");

imagesInput.addEventListener("change", () => {
  preview.innerHTML = "";

  Array.from(imagesInput.files).forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

async function convert(){
  const files = imagesInput.files;
  if(!files.length) return alert("Select images");

  const { PDFDocument } = PDFLib;
  const pdfDoc = await PDFDocument.create();

  for(const file of files){
    const bytes = await file.arrayBuffer();
    const image = await pdfDoc.embedJpg(bytes).catch(async () => {
      return await pdfDoc.embedPng(bytes);
    });

    const page = pdfDoc.addPage([image.width, image.height]);

    page.drawImage(image, {
      x:0,
      y:0,
      width:image.width,
      height:image.height
    });
  }

  const pdfBytes = await pdfDoc.save();

  const blob = new Blob([pdfBytes], {type:"application/pdf"});
  const url = URL.createObjectURL(blob);

  const download = document.getElementById("download");
  download.href = url;
  download.download = "images.pdf";
  download.innerText = "Download PDF ✔";
  download.style.display = "block";
}
</script>

</body>
</html>
