<style>
/* ---------- tokens ---------- */
:root{
    --ink:#15172b;
    --paper:#faf7f2;
    --card:#ffffff;
    --coral:#ff5a4e;
    --coral-deep:#df4538;
    --blue:#3b6fed;
    --blue-deep:#2554c7;
    --amber:#f2a93b;
    --amber-deep:#c97f12;
    --muted:#716c63;
    --border:#e8e2d8;
    --success:#7CF29C;
    --success-ink:#0f5132;

    --display:'Fraunces', serif;
    --body:'Inter', system-ui, sans-serif;
    --mono:'IBM Plex Mono', monospace;

    --container:780px;
    --shadow-soft:0 10px 28px -14px rgba(21,23,43,.16);
    --shadow-lift:0 20px 40px -16px rgba(21,23,43,.22);
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
    margin:0;
    font-family:var(--body);
    background:var(--paper);
    background-image:radial-gradient(circle at 1px 1px, rgba(21,23,43,.05) 1px, transparent 0);
    background-size:16px 16px;
    color:var(--ink);
    line-height:1.6;
}

a{color:inherit;text-decoration:none;}

*:focus-visible{outline:2px solid var(--blue);outline-offset:3px;border-radius:6px;}

/* ---------- header ---------- */
header{
    position:sticky;top:0;z-index:50;
    background:rgba(21,23,43,.94);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,.08);
}
.header-inner{
    max-width:1180px;margin:0 auto;padding:14px 24px;
    display:flex;justify-content:space-between;align-items:center;gap:16px;
}
.brand{
    display:flex;align-items:center;gap:10px;
    font-family:var(--display);font-weight:600;font-size:18px;color:#fff;
    letter-spacing:-.01em;
}
.brand-mark{
    font-family:var(--mono);font-size:10px;font-weight:600;color:#fff;
    background:linear-gradient(160deg,var(--coral),var(--coral-deep));
    padding:6px 7px 5px;border-radius:5px;letter-spacing:.03em;
    clip-path:polygon(0 0,75% 0,100% 35%,100% 100%,0 100%);
}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{
    color:rgba(255,255,255,.82);font-size:14px;font-weight:500;
    padding:8px 12px;border-radius:8px;transition:background .2s,color .2s;
}
.nav-links a:hover{background:rgba(255,255,255,.08);color:#fff;}

/* ---------- main container ---------- */
.container{
    max-width:var(--container);
    margin:40px auto; /* Boşluğu kapatmak için üst margin dengelendi */
    padding-inline:24px;
}

/* ---------- ticket card ---------- */
.ticket{
    position:relative;
    background:var(--card);
    border-radius:0 0 10px 10px;
    padding:40px 32px 32px;
    box-shadow:var(--shadow-soft);
    clip-path:polygon(
        0% 0%, 100% 0%, 
        100% 98%, 96% 100%, 92% 98%, 88% 100%, 84% 98%, 80% 100%, 76% 98%, 72% 100%, 68% 98%, 64% 100%, 60% 98%, 56% 100%, 52% 98%, 48% 100%, 44% 98%, 40% 100%, 36% 98%, 32% 100%, 28% 98%, 24% 100%, 20% 98%, 16% 100%, 12% 98%, 8% 100%, 4% 98%, 0% 100%
    );
}

.eyebrow{
    font-family:var(--mono);font-size:.72rem;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;color:var(--blue);margin:0 0 12px;
    text-align:center;
}

<h2>{
    font-family:var(--display);
    font-weight:600;
    font-size:clamp(1.8rem,4vw,2.4rem);
    letter-spacing:-.01em;
    margin:0 0 8px;
    text-align:center;
}

.lede{
    color:var(--muted);
    font-size:1rem;
    margin:0 0 24px;
    text-align:center;
}

/* ---------- inputs & select ---------- */
input[type="file"], select{
    width:100%;
    margin-top:14px;
    padding:16px;
    border-radius:12px;
    font-family:var(--body);
    font-size:14px;
    box-sizing:border-box;
}

input[type="file"]{
    border:2px dashed var(--border);
    background:var(--paper);
    color:var(--muted);
    cursor:pointer;
    transition:border-color .2s, background .2s;
}

input[type="file"]:hover{
    border-color:var(--coral);
    background:rgba(255,90,78,.02);
}

select{
    border:1px solid var(--border);
    background:var(--paper);
    color:var(--ink);
    font-weight:500;
    cursor:pointer;
}

/* ---------- buttons ---------- */
.btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
}

@media(max-width:480px){
    .btn-group { grid-template-columns: 1fr; }
}

button{
    width:100%;
    padding:16px;
    font-family:var(--body);
    font-size:15px;
    font-weight:600;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:transform .2s, box-shadow .2s, background .2s;
}

button.btn-preview {
    background: var(--blue);
    color: white;
    box-shadow: 0 4px 12px rgba(59,111,237,.15);
}
button.btn-preview:hover {
    background: var(--blue-deep);
    transform:translateY(-1px);
    box-shadow: 0 6px 16px rgba(59,111,237,.25);
}

button.btn-rotate {
    background: linear-gradient(160deg, var(--coral), var(--coral-deep));
    color: white;
    box-shadow: 0 4px 12px rgba(223,69,56,.15);
}
button.btn-rotate:hover {
    transform:translateY(-1px);
    box-shadow: 0 6px 16px rgba(223,69,56,.25);
}

button:active{
    transform:translateY(1px);
}

/* ---------- preview wrapper & canvas ---------- */
.preview-box{
    width:100%;
    overflow:auto;
    display:flex;
    justify-content:center;
    margin-top:24px;
    background: var(--paper);
    padding: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
}

#preview{
    display:none;
    border:1px solid var(--border);
    border-radius:8px;
    background:white;
    box-shadow: var(--shadow-soft);
}

#status {
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--blue);
    text-align: center;
}

/* ---------- download trigger ---------- */
a#download {
    display: none;
    margin-top: 16px;
    padding: 14px;
    text-align: center;
    font-weight: 600;
    font-size: 15px;
    background: var(--success);
    color: var(--success-ink);
    border-radius: 10px;
    box-shadow: 0 4px 12px rgba(124,242,156,.2);
    transition: transform .2s;
    width: 100%;
}
a#download:hover{
    transform:translateY(-1px);
}

/* ---------- perforation ---------- */
.perforation{
    height:3px;margin:24px 0 24px;
    background-image:radial-gradient(circle,var(--paper) 1.6px,transparent 1.7px);
    background-size:11px 100%;background-repeat:repeat-x;
}

/* ---------- ads styling ---------- */
.ad-block{
    margin: 28px auto 8px;
    text-align:center;
    width: 100%;
    clear: both;
}

.mobile-ad{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    text-align:center;
    padding:8px;
    box-shadow:0 -4px 20px rgba(21,23,43,0.08);
    border-top: 1px solid var(--border);
    z-index:9999;
    display:none;
}

@media(max-width:768px){
    .mobile-ad{display:block;}
    body{padding-bottom:88px;}
}
</style>
</head>

<body>

<header>
    <div class="header-inner">
        <a href="/" class="brand">
            <span class="brand-mark">PDF</span> PDFQuickTools
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </div>
</header>

<div class="container">

    <div class="ticket">
        <div class="eyebrow">MANAGE PAGES</div>
        <h2>PDF Rotate + Preview</h2>
        <p class="lede">Change page orientation and preview layouts instantly</p>

        <input type="file" id="file" accept="application/pdf"/>

        <select id="rotation">
          <option value="0">0° (Normal)</option>
          <option value="90">90° Right</option>
          <option value="180">180° Flip</option>
          <option value="270">270° Left</option>
        </select>

        <div class="btn-group">
            <button class="btn-preview" onclick="previewPDF()">Preview</button>
            <button class="btn-rotate" onclick="rotatePDF()">Rotate & Download</button>
        </div>

        <div class="preview-box">
          <canvas id="preview"></canvas>
        </div>

        <p id="status"></p>
        <a id="download"></a>

        <!-- REKLAM ALANI BİLETİN İÇİNE, PERFORATION'IN HEMEN ÜSTÜNE ALINDI -->
        <div class="ad-block">
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-6722827238956891"
               data-ad-slot="1111111111"
               data-ad-format="auto"></ins>
        </div>
        <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
        </script>

        <div class="perforation"></div>
        
        <a style="display:inline-flex; justify-content:center; width:100%; font-size:14px; color:var(--muted); font-weight:500;" href="/index.html">← Home</a>
    </div>

</div>

<!-- MOBILE ADS -->
<div class="mobile-ad">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-6722827238956891"
       data-ad-slot="4444444444"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<script>
