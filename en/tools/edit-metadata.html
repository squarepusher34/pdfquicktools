        --blue: #3b6fed;

      * { box-sizing: border-box; }

        line-height: 1.6;

      a { color: inherit; text-decoration: none; }

      /* ---------- header (Ana sayfa ile eşitlendi) ---------- */
      header {

      .header-inner {

      .ad-block {

        padding-inline: 24px;
        text-align: center;

      /* ---------- main container ---------- */
      .container { max-width: var(--form-container); margin: 24px auto 40px; padding-inline: 24px; }
