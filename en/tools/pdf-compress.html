/* ---------- tokens ---------- */

    --ink:#15172b;

/* ---------- main container ---------- */

/* ---------- ticket card ---------- */

    );

.eyebrow{

<h2>{
    font-family:var(--display);
    font-weight:600;
    font-size:clamp(1.8rem,4vw,2.4rem);

/* ---------- input file zone ---------- */
input[type="file"] {
    width:100%;

    border:2px dashed var(--border);

/* ---------- quality controls ---------- */

/* ---------- status tracking ---------- */

/* ---------- download trigger ---------- */
a#download {

a#download:hover{

/* ---------- perforation ---------- */
.perforation{

/* ---------- footer element ---------- */

    color:var(--muted);
    font-weight:500;
    transition:color .2s;
}

.back:hover{

}

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<!-- pdf-lib -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
const qualitySlider = document.getElementById("quality");
const qualityValue = document.getElementById("qualityValue");

qualitySlider.addEventListener("input", () => {
  qualityValue.innerText = qualitySlider.value;
});

async function compressPDF() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select a PDF");

  const status = document.getElementById("status");
  const download = document.getElementById("download");

  status.innerText = "Processing...";
  download.style.display = "none";

  const quality = document.getElementById("quality").value;
  const jpegQuality = quality / 10;

  const arrayBuffer = await file.arrayBuffer();

  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  const { PDFDocument } = PDFLib;
  const newPdf = await PDFDocument.create();

  for (let i = 1; i <= pdf.numPages; i++) {
    status.innerText = `Page ${i}/${pdf.numPages}`;

    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 1.4 });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext: ctx,
      viewport: viewport,
    }).promise;

    const imgData = canvas.toDataURL("image/jpeg", jpegQuality);

    const img = await newPdf.embedJpg(imgData);

    const pdfPage = newPdf.addPage([viewport.width, viewport.height]);

    pdfPage.drawImage(img, {
      x: 0,
      y: 0,
      width: viewport.width,
      height: viewport.height,
    });
  }

  const pdfBytes = await newPdf.save();

  const blob = new Blob([pdfBytes], { type: "application/pdf" });
  const url = URL.createObjectURL(blob);

  download.href = url;
  download.download = "compressed.pdf";
  download.style.display = "inline-block";
  download.innerText = "Download PDF ✔";
