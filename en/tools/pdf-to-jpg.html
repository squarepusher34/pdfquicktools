<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6722827238956891"
crossorigin="anonymous"></script>

<title>PDF to JPG Converter | PDFQuickTools</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f3f4f6;
  color:#111;
}

/* HEADER = SAME AS MERGE */
header{
  background:#0f172a;
  color:white;
  padding:18px;
  text-align:center;
  font-weight:600;
}

/* CONTAINER */
.container{
  max-width:800px;
  margin:40px auto;
  padding:20px;
}

/* CARD = SAME AS MERGE */
.card{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

h1{
  margin-top:0;
}

/* INPUT */
input{
  margin:20px 0;
  padding:15px;
  width:100%;
  border:2px dashed #cbd5e1;
  border-radius:12px;
  background:#fafafa;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#1d4ed8;
}

/* NOTE */
.note{
  margin-top:15px;
  font-size:13px;
  color:#6b7280;
}

/* BACK = SAME AS MERGE */
.back{
  display:block;
  margin-top:20px;
  text-decoration:none;
  color:#2563eb;
  font-weight:500;
}
</style>
</head>

<body>

<header>
PDFQuickTools • PDF → JPG
</header>

<div class="container">

<div class="card">

<h1>PDF → JPG Converter</h1>
<p>Convert PDF pages into images</p>

<input type="file" id="file" accept="application/pdf">

<button onclick="convert()">Convert</button>

<p class="note">Files are processed in your browser and never uploaded to a server.</p>

<a class="back" href="/">← Home</a>

<div id="output"></div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>

let zip = new JSZip();

async function convert() {

  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select a PDF");

  const url = URL.createObjectURL(file);
  const pdf = await pdfjsLib.getDocument(url).promise;

  zip = new JSZip();

  for (let i = 1; i <= pdf.numPages; i++) {

    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 2 });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise;

    const imgData = canvas.toDataURL("image/jpeg", 0.9);

    zip.file(`page-${i}.jpg`, imgData.split(',')[1], {base64:true});
  }

  zip.generateAsync({type:"blob"}).then(function(content) {
    saveAs(content, "pdf-to-jpg.zip");
  });

  document.getElementById("output").innerHTML =
    "Done! ZIP ready.";
}

</script>

</body>
</html>
