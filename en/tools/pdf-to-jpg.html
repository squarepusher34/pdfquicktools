<style>
/* ---------- tokens ---------- */
:root{
    --ink:#15172b;
    --paper:#faf7f2;
    --card:#ffffff;
    --coral:#ff5a4e;
    --coral-deep:#df4538;
    --blue:#3b6fed;
    --muted:#716c63;
    --border:#e8e2d8;

    --display:'Fraunces', serif;
    --body:'Inter', system-ui, sans-serif;
    --mono:'IBM Plex Mono', monospace;

    --container:680px;
    --shadow-soft:0 10px 28px -14px rgba(21,23,43,.16);
    --shadow-lift:0 20px 40px -16px rgba(21,23,43,.22);
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
    margin:0;
    font-family:var(--body);
    background:var(--paper);
    background-image:radial-gradient(circle at 1px 1px, rgba(21,23,43,.05) 1px, transparent 0);
    background-size:16px 16px;
    color:var(--ink);
    line-height:1.6;
}

a{color:inherit;text-decoration:none;}

*:focus-visible{outline:2px solid var(--blue);outline-offset:3px;border-radius:6px;}

/* ---------- header ---------- */
header{
    position:sticky;top:0;z-index:50;
    background:rgba(21,23,43,.94);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,.08);
}
.header-inner{
    max-width:1180px;margin:0 auto;padding:14px 24px;
    display:flex;justify-content:space-between;align-items:center;gap:16px;
}
.brand{
    display:flex;align-items:center;gap:10px;
    font-family:var(--display);font-weight:600;font-size:18px;color:#fff;
    letter-spacing:-.01em;
}
.brand-mark{
    font-family:var(--mono);font-size:10px;font-weight:600;color:#fff;
    background:linear-gradient(160deg,var(--coral),var(--coral-deep));
    padding:6px 7px 5px;border-radius:5px;letter-spacing:.03em;
    clip-path:polygon(0 0,75% 0,100% 35%,100% 100%,0 100%);
}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{
    color:rgba(255,255,255,.82);font-size:14px;font-weight:500;
    padding:8px 12px;border-radius:8px;transition:background .2s,color .2s;
}
.nav-links a:hover{background:rgba(255,255,255,.08);color:#fff;}

/* ---------- main container ---------- */
.container{
    max-width:var(--container);
    margin:40px auto;
    padding-inline:24px;
}

/* ---------- ticket card ---------- */
.ticket{
    position:relative;
    background:var(--card);
    border-radius:0 0 10px 10px;
    padding:40px 32px 32px;
    box-shadow:var(--shadow-soft);
    clip-path:polygon(
        0% 0%, 100% 0%, 
        100% 98%, 96% 100%, 92% 98%, 88% 100%, 84% 98%, 80% 100%, 76% 98%, 72% 100%, 68% 98%, 64% 100%, 60% 98%, 56% 100%, 52% 98%, 48% 100%, 44% 98%, 40% 100%, 36% 98%, 32% 100%, 28% 98%, 24% 100%, 20% 98%, 16% 100%, 12% 98%, 8% 100%, 4% 98%, 0% 100%
    );
}

.eyebrow{
    font-family:var(--mono);font-size:.72rem;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;color:var(--blue);margin:0 0 12px;
    text-align:center;
}

h1{
    font-family:var(--display);
    font-weight:600;
    font-size:clamp(1.8rem,4vw,2.4rem);
    letter-spacing:-.01em;
    margin:0 0 8px;
    text-align:center;
}

.lede{
    color:var(--muted);
    font-size:1rem;
    margin:0 0 32px;
    text-align:center;
}

/* ---------- input zone ---------- */
input[type="file"]{
    width:100%;
    padding:32px 16px;
    border:2px dashed var(--border);
    border-radius:12px;
    background:var(--paper);
    font-family:var(--body);
    font-size:14px;
    color:var(--muted);
    cursor:pointer;
    transition:border-color .2s, background .2s;
    margin:20px 0;
}

input[type="file"]:hover{
    border-color:var(--coral);
    background:rgba(255,90,78,.02);
}

/* ---------- button ---------- */
button{
    width:100%;
    padding:16px;
    background:linear-gradient(160deg, var(--coral), var(--coral-deep));
    color:white;
    border:none;
    border-radius:12px;
    font-family:var(--body);
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(223,69,56,.2);
    transition:transform .2s, box-shadow .2s;
}

button:hover{
    transform:translateY(-1px);
    box-shadow:0 6px 16px rgba(223,69,56,.3);
}

button:active{
    transform:translateY(1px);
}

/* ---------- status tracking ---------- */
#output {
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--blue);
    text-align: center;
}

.note{
    font-size:13px;
    color:var(--muted);
    text-align:center;
    margin:20px 0 0;
}

/* ---------- ads styling ---------- */
.ad-block{
    margin: 24px auto 0;
    text-align:center;
    width: 100%;
    clear: both;
}

/* ---------- perforation ---------- */
.perforation{
    height:3px;margin:24px 0 24px;
    background-image:radial-gradient(circle,var(--paper) 1.6px,transparent 1.7px);
    background-size:11px 100%;background-repeat:repeat-x;
}

/* ---------- footer elements ---------- */
.back{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:100%;
    font-size:14px;
    color:var(--muted);
    font-weight:500;
    transition:color .2s;
}

.back:hover{
    color:var(--ink);
}
</style>

<body>

<header>
    <div class="header-inner">
        <a href="/" class="brand">
            <span class="brand-mark">PDF</span> PDFQuickTools
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </div>
</header>

<div class="container">

    <div class="ticket">
        <div class="eyebrow">IMAGE CONVERTER</div>
        <h1>PDF → JPG Converter</h1>
        <p class="lede">Convert PDF pages into high-quality JPG images safely</p>

        <input type="file" id="file" accept="application/pdf">

        <button onclick="convert()">Convert PDF</button>

        <div id="output"></div>

        <p class="note">⚙️ Files are processed safely in your browser, nothing is uploaded to a server.</p>

        (adsbygoogle = window.adsbygoogle || []).push({});

        <a class="back" href="/">← Home</a>
    </div>

</div>

<script src="https://cloudflare.com"></script>
<script src="https://cloudflare.com"></script>

<script>
let zip = new JSZip();

async function convert() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select a PDF");

  const outputDiv = document.getElementById("output");
  outputDiv.innerHTML = "Processing pages...";

  const url = URL.createObjectURL(file);
  const pdf = await pdfjsLib.getDocument(url).promise;

  zip = new JSZip();

  for (let i = 1; i <= pdf.numPages; i++) {
    outputDiv.innerHTML = `Converting page ${i} of ${pdf.numPages}...`;

    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 2 });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise;

    const imgData = canvas.toDataURL("image/jpeg", 0.9);
    zip.file(`page-${i}.jpg`, imgData.split(',')[1], {base64:true});
  }

  outputDiv.innerHTML = "Generating ZIP file...";

  zip.generateAsync({type:"blob"}).then(function(content) {
    saveAs(content, "pdf-to-jpg.zip");
    outputDiv.innerHTML = "Done! ZIP ready ✔";
  });
}
</script>
