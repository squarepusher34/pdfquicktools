<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>PDF → Word</title>
</head>

<body>

<h2>PDF → Word</h2>

<input type="file" id="file">
<button onclick="convert()">Convert</button>

<p id="status"></p>

<script>

function setStatus(t){
  document.getElementById("status").innerText = t;
}

async function convert(){

  const file = document.getElementById("file").files[0];
  if(!file){
    alert("PDF seç");
    return;
  }

  setStatus("Job oluşturuluyor...");

  // 1) VERCEL BACKEND'E GİDİYOR
  const jobRes = await fetch("/api/job", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      tasks: {
        "import-1": { operation: "import/upload" },
        "convert-1": {
          operation: "convert",
          input: "import-1",
          output_format: "docx"
        },
        "export-1": {
          operation: "export/url",
          input: "convert-1"
        }
      }
    })
  });

  const job = await jobRes.json();
  console.log(job);

  if(!job.data){
    setStatus("Job error");
    return;
  }

  const jobId = job.data.id;

  const uploadTask = job.data.tasks.find(t => t.name === "import-1");

  setStatus("Dosya upload...");

  const formData = new FormData();

  Object.entries(uploadTask.result.form.parameters).forEach(([k,v])=>{
    formData.append(k,v);
  });

  formData.append("file", file);

  await fetch(uploadTask.result.form.url, {
    method: "POST",
    body: formData
  });

  setStatus("Dönüştürülüyor...");

  let url = null;

  while(!url){

    const check = await fetch(`/api/job`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ jobId })
    });

    const data = await check.json();

    const tasks = data.data.tasks;
    const exportTask = tasks.find(t => t.name === "export-1");

    if(exportTask?.status === "finished"){
      url = exportTask.result.files[0].url;
    }

    await new Promise(r => setTimeout(r, 2000));
  }

  setStatus("İndiriliyor...");

  const a = document.createElement("a");
  a.href = url;
  a.download = "file.docx";
  a.click();

  setStatus("Bitti ✔");
}

</script>

</body>
</html>
