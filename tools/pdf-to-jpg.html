<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF to JPG Converter | PDFQuickTools</title>

<style>
body{
  font-family:system-ui;
  background:#f6f7fb;
  margin:0;
  color:#111;
}

/* HEADER */
header{
  background:#0f172a;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header a{
  color:white;
  text-decoration:none;
  font-size:14px;
  font-weight:600;
}

/* CONTAINER */
.container{
  max-width:700px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:12px;
}

/* BUTTON */
button{
  padding:10px 15px;
  background:#2563eb;
  color:white;
  border:0;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

/* PROGRESS BAR */
.progress{
  width:100%;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
  margin-top:15px;
  display:none;
}

.bar{
  height:10px;
  width:0%;
  background:#2563eb;
  transition:0.2s;
}

/* OUTPUT */
#downloadBtn{
  display:none;
  margin-top:15px;
  background:#16a34a;
}
</style>
</head>

<body>

<header>
  <a href="/">← Home</a>
  <div>PDFQuickTools</div>
  <a href="/tools/merge.html">Merge PDF</a>
</header>

<div class="container">

<h1>PDF → JPG Converter</h1>

<input type="file" id="file" accept="application/pdf">

<button onclick="convert()">Convert</button>

<div class="progress" id="progress">
  <div class="bar" id="bar"></div>
</div>

<button id="downloadBtn" onclick="downloadZip()">Download ZIP</button>

<div id="output"></div>

</div>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>

let zip = new JSZip();
let images = [];

async function convert() {

  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select a PDF");

  const url = URL.createObjectURL(file);
  const pdf = await pdfjsLib.getDocument(url).promise;

  const progress = document.getElementById("progress");
  const bar = document.getElementById("bar");

  progress.style.display = "block";
  bar.style.width = "0%";

  zip = new JSZip();
  images = [];

  for (let i = 1; i <= pdf.numPages; i++) {

    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 2 });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise;

    const imgData = canvas.toDataURL("image/jpeg", 0.9);

    zip.file(`page-${i}.jpg`, imgData.split(',')[1], {base64:true});

    let percent = Math.round((i / pdf.numPages) * 100);
    bar.style.width = percent + "%";
  }

  document.getElementById("downloadBtn").style.display = "block";
  document.getElementById("output").innerHTML = "Done! Ready to download ZIP.";
}

function downloadZip(){
  zip.generateAsync({type:"blob"}).then(function(content) {
    saveAs(content, "pdf-to-jpg.zip");
  });
}

</script>

</body>
</html>
