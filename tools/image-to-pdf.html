<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JPG / PNG → PDF | PDFQuickTools</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6722827238956891"
crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>


<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f3f4f6;
  color:#111;
}

/* STANDARD HEADER */
header{
  background:#0f172a;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header a{
  color:white;
  text-decoration:none;
  font-size:14px;
  font-weight:600;
  margin-left:10px;
}

/* CONTAINER */
.container{
  max-width:800px;
  margin:40px auto;
  padding:20px;
}

/* CARD */
.card{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

.drop-zone{
  border:2px dashed #2563eb;
  padding:40px;
  border-radius:12px;
  cursor:pointer;
  color:#2563eb;
}

.preview{
  margin-top:15px;
  font-size:13px;
  color:#6b7280;
}

button{
  width:100%;
  padding:14px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  margin-top:15px;
  cursor:pointer;
}

button:hover{ background:#1d4ed8; }

.back{
  display:block;
  margin-top:20px;
  text-decoration:none;
  color:#2563eb;
  font-weight:500;
}
</style>
</head>

<body>

<header>
  <div>PDFQuickTools</div>
  <div>
    <a href="/tools/merge.html">Merge</a>
    <a href="/tools/pdf-to-jpg.html">JPG / PNG → PDF </a>
    <a href="/tools/pdf-compress.html">Compress</a>
  </div>
</header>

<div class="container">

<div class="card">

<h1>JPG / PNG → PDF</h1>
<p>JPG / PNG → PDF dönüşümü</p>

<div class="drop-zone" onclick="document.getElementById('fileInput').click()">
  Dosya seç veya sürükle
</div>

<input type="file" id="fileInput" multiple accept="image/*" hidden>

<p class="preview" id="status">Dosya seçilmedi</p>

<button onclick="convert()">PDF Oluştur</button>

<a class="back" href="/">← Ana Sayfa</a>

</div>

</div>

<script>
const input = document.getElementById("fileInput");
const status = document.getElementById("status");

input.addEventListener("change", () => {
  status.innerText = input.files.length + " dosya seçildi";
});

async function convert(){
  const files = input.files;
  if(!files.length) return alert("Select images");

  const { PDFDocument } = PDFLib;
  const pdf = await PDFDocument.create();

  for(const file of files){
    const bytes = await file.arrayBuffer();

    let img;
    if(file.type === "image/jpeg"){
      img = await pdf.embedJpg(bytes);
    } else {
      img = await pdf.embedPng(bytes);
    }

    const page = pdf.addPage([img.width, img.height]);
    page.drawImage(img, {x:0,y:0,width:img.width,height:img.height});
  }

  const pdfBytes = await pdf.save();
  const blob = new Blob([pdfBytes], {type:"application/pdf"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "images.pdf";
  a.click();
}
</script>

</body>
</html>
