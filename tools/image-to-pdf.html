<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Görsel → PDF | PDFQuickTools</title>
<meta name="description" content="JPG veya PNG görsellerinizi ücretsiz olarak PDF'e dönüştürün. Dosyalar tarayıcınızda işlenir, sunucuya yüklenmez.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
html, body { height: 100%; margin: 0; }
body { font-family: system-ui; background: #f6f7fb; display: flex; flex-direction: column; }
header { background: #0f172a; color: #fff; padding: 20px; text-align: center; position: relative; }
header a.home { position: absolute; top: 15px; left: 15px; color: white; text-decoration: none; font-weight: 600; background: #2563eb; padding: 8px 12px; border-radius: 8px; }
.container { max-width: 700px; margin: 40px auto; padding: 20px; flex: 1; }
.card { background: #fff; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,.1); padding: 30px; }
.drop-zone { border: 2px dashed #2563eb; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; color: #2563eb; transition: background 0.2s; }
.drop-zone:hover { background: #eff6ff; }
#fileInput { display: none; }
.preview-list { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
.preview-item { position: relative; width: 80px; }
.preview-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #e5e7eb; }
.preview-item button { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; line-height: 20px; text-align: center; padding: 0; }
.btn { margin-top: 20px; width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn:hover { background: #1d4ed8; }
.btn:disabled { background: #93c5fd; cursor: not-allowed; }
.info { margin-top: 16px; font-size: 13px; color: #6b7280; text-align: center; }
#status { margin-top: 16px; text-align: center; font-weight: 600; color: #16a34a; }
footer { text-align: center; padding: 20px; margin-top: auto; background: #ffffff; border-top: 1px solid #e5e7eb; }
footer a { margin: 0 8px; font-weight: 500; color: #2563eb; text-decoration: none; }
</style>
</head>
<body>
<header>
  <a class="home" href="/index.html">← Ana Sayfa</a>
  <h1>Görsel → PDF</h1>
  <p>JPG veya PNG dosyalarını PDF'e dönüştür</p>
</header>
<div class="container">
  <div class="card">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <p>📁 Görsel seçmek için tıkla veya buraya sürükle</p>
      <p style="font-size:13px;color:#6b7280;">JPG, PNG desteklenir · Birden fazla dosya ekleyebilirsin</p>
    </div>
    <input type="file" id="fileInput" accept="image/jpeg,image/png" multiple>
    <div class="preview-list" id="previewList"></div>
    <button class="btn" id="convertBtn" onclick="convert()" disabled>PDF Oluştur</button>
    <p class="info">🔒 Dosyalar sunucuya yüklenmez, tamamen tarayıcınızda işlenir.</p>
    <div id="status"></div>
  </div>
</div>
<footer>
  <a href="/about.html">Hakkımızda</a> |
  <a href="/privacy.html">Gizlilik Politikası</a> |
  <a href="/contact.html">İletişim</a>
</footer>
<script>
let files = [];
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const previewList = document.getElementById('previewList');
const convertBtn = document.getElementById('convertBtn');
const status = document.getElementById('status');

fileInput.addEventListener('change', e => addFiles(Array.from(e.target.files)));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = '#eff6ff'; });
dropZone.addEventListener('dragleave', () => dropZone.style.background = '');
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.background = '';
  addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});

function addFiles(newFiles) {
  newFiles.forEach(f => {
    files.push(f);
    const reader = new FileReader();
    reader.onload = e => {
      const idx = files.length - 1;
      const div = document.createElement('div');
      div.className = 'preview-item';
      div.id = 'preview-' + idx;
      div.innerHTML = `<img src="${e.target.result}"><button onclick="removeFile(${idx})">✕</button>`;
      previewList.appendChild(div);
    };
    reader.readAsDataURL(f);
  });
  updateBtn();
}

function removeFile(idx) {
  files[idx] = null;
  const el = document.getElementById('preview-' + idx);
  if (el) el.remove();
  updateBtn();
}

function updateBtn() {
  convertBtn.disabled = files.filter(f => f !== null).length === 0;
}

async function convert() {
  const activeFiles = files.filter(f => f !== null);
  if (!activeFiles.length) return;
  convertBtn.disabled = true;
  status.textContent = 'İşleniyor...';
  try {
    const { PDFDocument } = PDFLib;
    const pdfDoc = await PDFDocument.create();
    for (const file of activeFiles) {
      const arrayBuffer = await file.arrayBuffer();
      let img;
      if (file.type === 'image/jpeg') {
        img = await pdfDoc.embedJpg(arrayBuffer);
      } else {
        img = await pdfDoc.embedPng(arrayBuffer);
      }
      const page = pdfDoc.addPage([img.width, img.height]);
      page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
    }
    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'gorseller.pdf';
    a.click();
    URL.revokeObjectURL(url);
    status.textContent = '✅ PDF başarıyla oluşturuldu!';
  } catch (err) {
    status.style.color = '#ef4444';
    status.textContent = '❌ Hata oluştu: ' + err.message;
  }
  convertBtn.disabled = false;
  updateBtn();
}
</script>
</body>
</html>
