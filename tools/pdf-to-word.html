    <style>
      /* ---------- tokens ---------- */
      :root {
        --ink: #15172b;
        --paper: #faf7f2;
        --card: #ffffff;
        --coral: #ff5a4e;
        --coral-deep: #df4538;
        --blue: #3b6fed;
        --amber: #f2a93b;
        --amber-deep: #c97f12;
        --muted: #716c63;
        --border: #e8e2d8;
        --green: #1f9d6b;

        --display: "Fraunces", serif;
        --body: "Inter", system-ui, sans-serif;
        --mono: "IBM Plex Mono", monospace;

        --container: 680px;
        --shadow-soft: 0 10px 28px -14px rgba(21, 23, 43, 0.16);
        --shadow-lift: 0 20px 40px -16px rgba(21, 23, 43, 0.22);
      }

      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: var(--body);
        background: var(--paper);
        background-image: radial-gradient(
          circle at 1px 1px,
          rgba(21, 23, 43, 0.05) 1px,
          transparent 0
        );
        background-size: 16px 16px;
        color: var(--ink);
        line-height: 1.6;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      *:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 3px;
        border-radius: 6px;
      }

      /* ---------- header ---------- */
      header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(21, 23, 43, 0.94);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .header-inner {
        max-width: 1180px;
        margin: 0 auto;
        padding: 14px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: var(--display);
        font-weight: 600;
        font-size: 18px;
        color: #fff;
        letter-spacing: -0.01em;
      }
      .brand-mark {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(160deg, var(--coral), var(--coral-deep));
        padding: 6px 7px 5px;
        border-radius: 5px;
        letter-spacing: 0.03em;
        clip-path: polygon(0 0, 75% 0, 100% 35%, 100% 100%, 0 100%);
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .nav-links a {
        color: rgba(255, 255, 255, 0.82);
        font-size: 14px;
        font-weight: 500;
        padding: 8px 12px;
        border-radius: 8px;
        transition: background 0.2s, color 0.2s;
      }
      .nav-links a:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }

      /* ---------- ad block ---------- */
      .ad-block {
        max-width: 1180px;
        margin: 12px auto 0;
        padding-inline: 24px;
        text-align: center;
      }

      /* ---------- main container ---------- */
      .container {
        max-width: var(--container);
        margin: 20px auto 60px;
        padding-inline: 24px;
      }

      /* ---------- ticket card ---------- */
      .ticket {
        position: relative;
        background: var(--card);
        border-radius: 0 0 10px 10px;
        padding: 40px 32px 32px;
        box-shadow: var(--shadow-soft);
        clip-path: polygon(
          0% 0%,
          100% 0%,
          100% 98%,
          96% 100%,
          92% 98%,
          88% 100%,
          84% 98%,
          80% 100%,
          76% 98%,
          72% 100%,
          68% 98%,
          64% 100%,
          60% 98%,
          56% 100%,
          52% 98%,
          48% 100%,
          44% 98%,
          40% 100%,
          36% 98%,
          32% 100%,
          28% 98%,
          24% 100%,
          20% 98%,
          16% 100%,
          12% 98%,
          8% 100%,
          4% 98%,
          0% 100%
        );
      }

      .eyebrow {
        font-family: var(--mono);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--blue);
        margin: 0 0 12px;
        text-align: center;
      }

      h1 {
        font-family: var(--display);
        font-weight: 600;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        letter-spacing: -0.01em;
        margin: 0 0 8px;
        text-align: center;
      }

      .lede {
        color: var(--muted);
        font-size: 1rem;
        margin: 0 0 32px;
        text-align: center;
      }

      /* ---------- upload zone ---------- */
      .file-input-wrapper {
        position: relative;
        margin-bottom: 24px;
      }

      input[type="file"] {
        width: 100%;
        padding: 40px 20px;
        border: 2px dashed var(--border);
        border-radius: 12px;
        background: var(--paper);
        font-family: var(--body);
        font-size: 14px;
        color: var(--muted);
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
      }

      input[type="file"]:hover {
        border-color: var(--coral);
        background: rgba(255, 90, 78, 0.02);
      }

      /* ---------- button ---------- */
      button {
        width: 100%;
        padding: 16px;
        background: linear-gradient(160deg, var(--coral), var(--coral-deep));
        color: white;
        border: none;
        border-radius: 12px;
        font-family: var(--body);
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(223, 69, 56, 0.2);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(223, 69, 56, 0.3);
      }

      button:active {
        transform: translateY(1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      /* ---------- perforation ---------- */
      .perforation {
        height: 3px;
        margin: 32px 0 24px;
        background-image: radial-gradient(
          circle,
          var(--paper) 1.6px,
          transparent 1.7px
        );
        background-size: 11px 100%;
        background-repeat: repeat-x;
      }

      /* ---------- footer elements ---------- */
      .note {
        font-size: 13px;
        color: var(--muted);
        text-align: center;
        margin: 0 0 24px;
      }

      .back {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        font-size: 14px;
        color: var(--muted);
        font-weight: 500;
        transition: color 0.2s;
      }

      .back:hover {
        color: var(--ink);
      }

      /* ---------- status ---------- */
      .status {
        margin-top: 16px;
        font-family: var(--mono);
        font-size: 13px;
        color: var(--amber-deep);
        text-align: center;
        min-height: 18px;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-inner">
        <a href="/" class="brand">
          <span class="brand-mark">PDF</span> PDFQuickTools
        </a>
        <div class="nav-links">
          <a href="/">Ana Sayfa</a>
        </div>
      </div>
    </header>

    <!-- AD -->
    <div class="ad-block">

        style="display: block"
        data-ad-client="ca-pub-6722827238956891"

        data-ad-format="auto"

      (adsbygoogle = window.adsbygoogle || []).push({});

    <div class="container">
      <div class="ticket">
        <div class="eyebrow">PDF ARAÇLARI</div>
        <h1>PDF'ten Word'e Çevir</h1>
        <p class="lede">PDF dosyanı seç, Word belgesi olarak indir</p>

        <div class="file-input-wrapper">
          <input type="file" id="file" accept="application/pdf" />
        </div>

        <button id="convertBtn" onclick="convert()">Dönüştür</button>

        <div class="status" id="status"></div>

        <div class="perforation"></div>

        <p class="note">Dönüştürme işlemi CloudConvert üzerinden yapılır.</p>

        <a class="back" href="/">← Ana sayfa</a>
      </div>
    </div>

    <script>
      function setStatus(t) {
        document.getElementById("status").innerText = t;
      }

      // 🔑 YOUR CLOUDCONVERT TOKEN
      const API_KEY =
        "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJhdWQiOiIxIiwianRpIjoiNWQyOWEyNzk2MWUwNzNkZmViYjZhN2ZmOTQyMTU1NWQ1ZDUzOTFkMzg5M2U5ZDQyYmY2YTRjNWVjNmQ4NTlhZGU0ZWNlMTg0NzcyMWVlY2IiLCJpYXQiOjE3ODE2OTA4MDEuNTkwNDc5LCJuYmYiOjE3ODE2OTA4MDEuNTkwNDgxLCJleHAiOjQ5MzczNjQ0MDEuNTY3OTIxLCJzdWIiOiI3NjAwNTkyOSIsInNjb3BlcyI6WyJ0YXNrLnJlYWQiLCJ0YXNrLndyaXRlIl19.VDQdFLXNgfF0xM31UMDkWCJfC7zIITcSXCmhvXVk1wehlkQBKyZfFOHzQkKzUTzTgBN-oMdGUU9wSRZmw5LivyLH3MTqmlrdKjcEx-xv_YycVk6pqI6i-3b9Ms8N-e9z5pG2WsiKP5cS3d5fZB8UMJr1Ur6kmJgGZ4TUccwvvr_4btZd1HMG6KY2LK6y0DXrhmssiEuz5k7uvKCqWHLktC7Ww5-GXUda-IOSdePFbMsHB13bxcCf6QxTSAVUwxlrwZSmJUV1CUTLDfetZi0bBGS_g71BmLSv2pZBI6ekO6fEGs91ASQR8iJzM1NtR0ZeQeQT8ZbnnH6nyj8Gy1KQyh2RP6hT6dl2iyoEsp8VIkO62PXTbpI9DF1IzPZgVa80oEoKy11UZTjVP9hnoiuGwnQOOPXlOjZhT1JnsQWjEb1vuWpG3soZGR66rsN1mdsYg5Sk61JWOm596stuxVU4AHtb7Mdc3Yt9UL-T1dhF7Ky8xz9S2_jaeeVQsa89G72MpgLWIWwhmDmr7kbYD1W29tRjIvU-cBrqa9DyWaHC7I0LJB3u0evVlndU6Ml2DKzDe0xa5raLtQMEMvAnJSqWg9RwaM8ftwWY60PuxJT9okDMRI_H5BwJoayLX75qVz7l2Z-keRY40ZLeuOx8FWnjN4dmdF7jTo8uiX2hEiKzNvs";

      async function convert() {
        const file = document.getElementById("file").files[0];
        const btn = document.getElementById("convertBtn");

        if (!file) {
          alert("PDF seç");
          return;
        }

        btn.disabled = true;

        try {
          setStatus("Job oluşturuluyor...");

          // 1) CREATE JOB
          const jobRes = await fetch("https://api.cloudconvert.com/v2/jobs", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + API_KEY,
            },
            body: JSON.stringify({
              tasks: {
                "import-1": { operation: "import/upload" },
                "convert-1": {
                  operation: "convert",
                  input: "import-1",
                  output_format: "docx",
                },
                "export-1": {
                  operation: "export/url",
                  input: "convert-1",
                },
              },
            }),
          });

          const job = await jobRes.json();
          console.log("JOB:", job);

          if (!job.data) {
            setStatus("Job oluşturulamadı");
            btn.disabled = false;
            return;
          }

          const jobId = job.data.id;
          const uploadTask = job.data.tasks.find((t) => t.name === "import-1");

          if (!uploadTask || !uploadTask.result || !uploadTask.result.form) {
            console.log("UPLOAD TASK:", uploadTask);
            setStatus("Upload form yok (console bak)");
            btn.disabled = false;
            return;
          }

          setStatus("Dosya yükleniyor...");

          // 2) UPLOAD
          const formData = new FormData();
          const params = uploadTask.result.form.parameters;

          if (params) {
            Object.entries(params).forEach(([k, v]) => {
              formData.append(k, v);
            });
          }

          formData.append("file", file);

          const uploadRes = await fetch(uploadTask.result.form.url, {
            method: "POST",
            body: formData,
          });

          const uploadText = await uploadRes.text();
          console.log("UPLOAD:", uploadRes.status, uploadText);

          if (!uploadRes.ok) {
            setStatus("Upload başarısız (console bak)");
            btn.disabled = false;
            return;
          }

          setStatus("Dönüştürülüyor...");

          // 3) WAIT RESULT
          let resultUrl = null;

          while (!resultUrl) {
            const check = await fetch(
              "https://api.cloudconvert.com/v2/jobs/" + jobId,
              {
                headers: {
                  Authorization: "Bearer " + API_KEY,
                },
              }
            );

            const data = await check.json();
            const exportTask = data.data.tasks.find((t) => t.name === "export-1");

            if (exportTask && exportTask.status === "finished") {
              resultUrl = exportTask.result.files[0].url;
            }

            await new Promise((r) => setTimeout(r, 2000));
          }

          setStatus("İndiriliyor...");

          const a = document.createElement("a");
          a.href = resultUrl;
          a.download = "donusturuldu.docx";
          a.click();

          setStatus("Tamamlandı ✔");
          btn.disabled = false;
        } catch (err) {
          console.error(err);
          setStatus("HATA: console bak");
          btn.disabled = false;
        }
      }
    </script>
  </body>
