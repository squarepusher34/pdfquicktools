<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF to Word - PDFQuickTools</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- DOCX -->
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f3f4f6;
  color:#111;
}

header{
  background:#0f172a;
  color:white;
  padding:18px;
  text-align:center;
  font-weight:600;
}

.container{
  max-width:800px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

input{
  margin:20px 0;
  padding:15px;
  width:100%;
  border:2px dashed #cbd5e1;
  border-radius:12px;
  background:#fafafa;
}

button{
  width:100%;
  padding:14px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#1d4ed8;
}

.note{
  margin-top:15px;
  font-size:13px;
  color:#6b7280;
}

.status{
  margin-top:10px;
  font-size:13px;
  color:#2563eb;
}
</style>
</head>

<body>

<header>
PDFQuickTools • Smart PDF to Word
</header>

<div class="container">
  <div class="card">

    <h1>PDF → Word</h1>

    <input type="file" id="file" accept="application/pdf">

    <button onclick="convert()">Dönüştür</button>

    <div class="status" id="status"></div>

    <p class="note">
      Metin varsa direkt çevirir, yoksa OCR kullanır. Format korunur.
    </p>

  </div>
</div>

<script>
// PDF worker fix
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const { Document, Packer, Paragraph, TextRun } = window.docx;

function setStatus(t){
  document.getElementById("status").innerText = t;
}

async function extractText(pdf){
  let text = "";

  for(let i = 1; i <= pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();

    const strings = content.items.map(item => item.str).join(" ");

    text += strings + "\n\n";
  }

  return text.trim();
}

// OCR fallback
async function ocrPage(page){

  const viewport = page.getViewport({ scale: 2 });

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = viewport.width;
  canvas.height = viewport.height;

  await page.render({
    canvasContext: ctx,
    viewport: viewport
  }).promise;

  const img = canvas.toDataURL("image/png");

  const result = await Tesseract.recognize(img, "eng+tur");

  return result.data.text;
}

// SMART PARAGRAPH BUILDER
function buildParagraphs(text){

  return text
    .split("\n")
    .map(l => l.trim())
    .filter(l => l.length > 0)
    .map(line => {

      const isHeading =
        line.length < 60 &&
        line === line.toUpperCase();

      return new Paragraph({
        children: [
          new TextRun({
            text: line,
            bold: isHeading
          })
        ]
      });

    });
}

async function convert(){

  const file = document.getElementById("file").files[0];

  if(!file){
    alert("PDF seçmelisin");
    return;
  }

  try {

    setStatus("PDF okunuyor...");

    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

    let text = await extractText(pdf);

    // OCR fallback
    if(!text || text.length < 10){

      setStatus("OCR çalışıyor... (tarama PDF)");

      text = "";

      for(let i = 1; i <= pdf.numPages; i++){
        const page = await pdf.getPage(i);
        const pageText = await ocrPage(page);
        text += pageText + "\n\n";
      }
    }

    setStatus("Word hazırlanıyor...");

    const paragraphs = buildParagraphs(text);

    const doc = new Document({
      sections: [{
        children: paragraphs
      }]
    });

    const blob = await Packer.toBlob(doc);

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "pdf-to-word.docx";
    a.click();

    setStatus("Bitti ✔");

  } catch(err){
    console.error(err);
    setStatus("Hata oluştu (console kontrol et)");
  }
}
</script>

</body>
</html>
