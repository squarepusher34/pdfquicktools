<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF to Word - PDFQuickTools</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- DOCX -->
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f3f4f6;
}

header{
  background:#0f172a;
  color:white;
  padding:18px;
  text-align:center;
  font-weight:600;
}

.container{
  max-width:800px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

input{
  margin:20px 0;
  padding:15px;
  width:100%;
  border:2px dashed #cbd5e1;
  border-radius:12px;
  background:#fafafa;
}

button{
  width:100%;
  padding:14px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.status{
  margin-top:10px;
  font-size:13px;
  color:#2563eb;
}

.note{
  margin-top:15px;
  font-size:13px;
  color:#6b7280;
}
</style>
</head>

<body>

<header>
PDFQuickTools • PDF to Word (Smart)
</header>

<div class="container">
  <div class="card">

    <h1>PDF → Word</h1>

    <input type="file" id="file" accept="application/pdf">

    <button onclick="convert()">Dönüştür</button>

    <div class="status" id="status"></div>

    <p class="note">
      Layout-aware conversion (daha düzgün Word çıktısı)
    </p>

  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const { Document, Packer, Paragraph, TextRun } = window.docx;

function setStatus(t){
  document.getElementById("status").innerText = t;
}

//
// 🔥 SMART LAYOUT EXTRACTOR (ASIL FIX)
//
async function extractSmart(pdf){

  let finalText = "";

  for(let p = 1; p <= pdf.numPages; p++){

    const page = await pdf.getPage(p);
    const content = await page.getTextContent();

    // sort by Y then X (critical)
    const items = content.items
      .map(i => ({
        text: i.str,
        x: i.transform[4],
        y: i.transform[5]
      }))
      .sort((a,b) => {
        if (Math.abs(a.y - b.y) > 5) return b.y - a.y;
        return a.x - b.x;
      });

    let lastY = null;
    let line = "";

    for(const item of items){

      if(lastY !== null && Math.abs(item.y - lastY) > 6){
        finalText += line.trim() + "\n";
        line = "";
      }

      line += item.text + " ";
      lastY = item.y;
    }

    finalText += line.trim() + "\n\n";
  }

  return finalText.trim();
}

//
// 🔥 WORD BUILDER
//
function buildDoc(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

  return lines.map(line => {

    const isHeading =
      line.length < 60 &&
      /^[A-ZÇĞİÖŞÜ0-9 ]+$/.test(line);

    return new Paragraph({
      children: [
        new TextRun({
          text: line,
          bold: isHeading
        })
      ]
    });

  });
}

async function convert(){

  try {

    const file = document.getElementById("file").files[0];

    if(!file){
      alert("PDF seçmelisin");
      return;
    }

    setStatus("PDF analiz ediliyor...");

    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

    let text = await extractSmart(pdf);

    if(!text || text.length < 10){
      setStatus("Metin zayıf çıktı (PDF image olabilir)");
    }

    setStatus("Word oluşturuluyor...");

    const paragraphs = buildDoc(text);

    const doc = new Document({
      sections: [{
        children: paragraphs
      }]
    });

    const blob = await Packer.toBlob(doc);

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "pdf-to-word.docx";
    a.click();

    setStatus("Bitti ✔");

  } catch(err){
    console.error(err);
    setStatus("Hata oluştu (console bak)");
  }
}
</script>

</body>
</html>
