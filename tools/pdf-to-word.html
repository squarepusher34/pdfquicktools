<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#15172b" />

<title>PDF'ten Word'e - PDFQuickTools</title>
<meta name="description" content="PDF dosyanı ücretsiz Word'e çevir" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />

<style>
:root {
  --ink:#15172b;
  --paper:#faf7f2;
  --card:#fff;
  --coral:#ff5a4e;
  --coral-deep:#df4538;
  --muted:#716c63;
  --border:#e8e2d8;
  --display:"Fraunces",serif;
  --body:"Inter",sans-serif;
  --mono:"IBM Plex Mono",monospace;
  --container:680px;
}

body{
  margin:0;
  font-family:var(--body);
  background:var(--paper);
  color:var(--ink);
}

header{
  position:sticky;
  top:0;
  background:rgba(21,23,43,.95);
  color:#fff;
  padding:14px 24px;
}

.container{
  max-width:var(--container);
  margin:40px auto;
  padding:0 24px;
}

.ticket{
  background:var(--card);
  padding:40px 30px;
  border-radius:12px;
}

h1{
  font-family:var(--display);
  text-align:center;
}

input{
  width:100%;
  padding:40px;
  border:2px dashed var(--border);
  border-radius:12px;
  margin-top:20px;
}

button{
  width:100%;
  padding:16px;
  margin-top:20px;
  background:linear-gradient(160deg,var(--coral),var(--coral-deep));
  color:#fff;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.status{
  margin-top:16px;
  text-align:center;
  font-family:var(--mono);
}
</style>
</head>

<body>

<header>
  PDFQuickTools
</header>

<div class="container">
  <div class="ticket">

    <h1>PDF → Word</h1>

    <input type="file" id="file" accept="application/pdf" />

    <button onclick="convert()">Dönüştür</button>

    <div class="status" id="status"></div>

  </div>
</div>

<script>
function setStatus(t){
  document.getElementById("status").innerText = t;
}

async function convert() {

  const file = document.getElementById("file").files[0];
  if (!file) return alert("PDF seç");

  try {
    setStatus("İşlem başlıyor...");

    // 1) VERCEL API CALL
    const jobRes = await fetch("/api/job", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        tasks: {
          "import-1": { operation: "import/upload" },
          "convert-1": {
            operation: "convert",
            input: "import-1",
            output_format: "docx"
          },
          "export-1": {
            operation: "export/url",
            input: "convert-1"
          }
        }
      })
    });

    const job = await jobRes.json();
    console.log(job);

    if (!job.data) {
      setStatus("Job hatası");
      return;
    }

    const jobId = job.data.id;
    const uploadTask = job.data.tasks.find(t => t.name === "import-1");

    setStatus("Dosya yükleniyor...");

    // 2) UPLOAD
    const form = new FormData();
    const params = uploadTask.result.form.parameters || {};

    Object.entries(params).forEach(([k,v])=>{
      form.append(k,v);
    });

    form.append("file", file);

    const uploadRes = await fetch(uploadTask.result.form.url, {
      method: "POST",
      body: form
    });

    if (!uploadRes.ok) {
      setStatus("Upload hata");
      return;
    }

    setStatus("Dönüştürülüyor...");

    // 3) WAIT
    let resultUrl = null;

    while(!resultUrl){
      const check = await fetch("/api/job", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({}) // (sadece placeholder)
      });

      const r = await fetch("https://api.cloudconvert.com/v2/jobs/" + jobId, {
        headers:{
          Authorization:"Bearer " + "USE_SERVER_SIDE_ONLY"
        }
      });

      const data = await r.json();

      const exp = data.data.tasks.find(t => t.name === "export-1");

      if(exp && exp.status === "finished"){
        resultUrl = exp.result.files[0].url;
      }

      await new Promise(r => setTimeout(r,2000));
    }

    setStatus("İndiriliyor...");

    const a = document.createElement("a");
    a.href = resultUrl;
    a.download = "converted.docx";
    a.click();

    setStatus("Bitti ✔");

  } catch(e){
    console.error(e);
    setStatus("HATA");
  }
}
</script>

</body>
</html>
