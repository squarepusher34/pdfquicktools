    <button onclick="convert()">Dönüştür</button>

async function convert(){

  const file = document.getElementById("file").files[0];

  if(!file){
    alert("PDF seçmelisin");
    return;
  }

  try {

    setStatus("Job oluşturuluyor...");

    // 1) CREATE JOB
    const jobRes = await fetch("https://api.cloudconvert.com/v2/jobs", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        tasks: {
          "import-1": {
            operation: "import/upload"
          },
          "convert-1": {
            operation: "convert",
            input: "import-1",
            output_format: "docx"
          },
          "export-1": {
            operation: "export/url",
            input: "convert-1"
          }
        }
      })
    });

    const job = await jobRes.json();

    console.log("JOB RESPONSE:", job);

    if(!job.data){
      setStatus("Job oluşmadı (console bak)");
      return;
    }

    const jobId = job.data.id;

    const uploadTask = job.data.tasks.find(t => t.name === "import-1");

    if(!uploadTask){
      setStatus("Upload task bulunamadı");
      return;
    }

    setStatus("Dosya yükleniyor...");

    // 2) UPLOAD FILE
    const form = new FormData();
    form.append("file", file);

    await fetch(uploadTask.result.form.url, {
      method: "POST",
      body: form
    });

    setStatus("Dönüştürülüyor...");

    // 3) WAIT RESULT
    let resultUrl = null;

    while(!resultUrl){

      const check = await fetch(
        "https://api.cloudconvert.com/v2/jobs/" + jobId,
        {
          headers: {
            "Authorization": "Bearer " + API_KEY
          }
        }
      );

      const data = await check.json();

      const exportTask = data.data.tasks.find(t => t.name === "export-1");

      if(exportTask && exportTask.status === "finished"){
        resultUrl = exportTask.result.files[0].url;
      }

      await new Promise(r => setTimeout(r, 2000));
    }

    setStatus("İndiriliyor...");

    const a = document.createElement("a");
    a.href = resultUrl;
    a.download = "converted.docx";
    a.click();

    setStatus("Bitti ✔");

  } catch(err){
    console.error(err);
    setStatus("HATA oluştu (console bak)");
  }
}

</script>
