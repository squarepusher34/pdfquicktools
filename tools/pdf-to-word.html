<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF → Word Converter</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:400px;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
  text-align:center;
}

h1{
  font-size:20px;
}

input{
  width:100%;
  margin:15px 0;
}

button{
  width:100%;
  padding:12px;
  border:0;
  border-radius:8px;
  background:#ff4d4d;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:.5;
}

#status{
  margin-top:10px;
  font-size:13px;
  color:#333;
}
</style>

</head>

<body>

<div class="box">
  <h1>PDF → Word</h1>

  <input type="file" id="file" accept="application/pdf"/>

  <button id="btn" onclick="convert()">Dönüştür</button>

  <div id="status"></div>
</div>

<script>

const API_URL = "https://snowy-heart-1955.timurayunlu.workers.dev/api/pdf-to-word";

const statusEl = document.getElementById("status");
const btn = document.getElementById("btn");

function setStatus(msg){
  statusEl.innerText = msg;
}

async function convert(){

  const file = document.getElementById("file").files[0];

  if(!file){
    alert("PDF seç");
    return;
  }

  btn.disabled = true;
  setStatus("Dosya gönderiliyor...");

  try {

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if(!data.success){
      throw new Error(data.message || "Hata oluştu");
    }

    setStatus("İndiriliyor...");

    const a = document.createElement("a");
    a.href = data.downloadUrl;
    a.download = "converted.docx";
    a.click();

    setStatus("Tamamlandı ✔");

  } catch(err){
    console.error(err);
    setStatus("Hata: " + err.message);
  }

  btn.disabled = false;
}

</script>

</body>
</html>
