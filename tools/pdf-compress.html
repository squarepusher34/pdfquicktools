<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compress PDF - PDFQuickTools</title>

<style>
:root{
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --primary:#2563eb;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* TOP BAR */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#0f172a;
  color:white;
}

.top-bar a{
  color:white;
  text-decoration:none;
  font-size:14px;
  opacity:0.9;
}

.top-bar a:hover{opacity:1}

.top-bar .title{
  font-weight:700;
  font-size:15px;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px 20px 10px;
}

.hero h1{
  margin:0;
  font-size:30px;
}

.hero p{
  color:var(--muted);
}

/* INFO STRIP */
.info{
  max-width:700px;
  margin:15px auto;
  text-align:center;
  color:#6b7280;
  font-size:14px;
}

.info small{
  display:block;
  margin-top:4px;
  font-size:12px;
}

/* CONTAINER */
.container{
  max-width:700px;
  margin:20px auto;
  padding:0 20px;
}

/* CARD */
.card{
  background:var(--card);
  padding:25px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  border:1px solid #eef0f5;
}

/* FILE INPUT */
input[type="file"]{
  width:100%;
  padding:12px;
  border:2px dashed #cbd5e1;
  border-radius:10px;
  margin-top:10px;
  background:#f8fafc;
}

/* RANGE */
.range{
  width:100%;
  margin-top:15px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:white;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

/* RESULT */
.result{
  margin-top:15px;
  padding:12px;
  background:#ecfeff;
  border-radius:10px;
  display:none;
}

small{
  color:var(--muted);
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
  <a href="/index.html">← Ana sayfa</a>
  <div class="title">Compress PDF</div>
  <a href="/index.html">Tools</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1 data-tr="PDF Sıkıştır" data-en="Compress PDF"></h1>
  <p data-tr="PDF boyutunu düşür, kaliteyi kontrol et"
     data-en="Reduce PDF size while controlling quality"></p>
</div>

<!-- INFO MESSAGE -->
<div class="info" id="statusText">
  Dosya seçilmedi  
  <small>Dosyalar tarayıcı içinde işlenir, sunucuya yüklenmez.</small>
</div>

<div class="container">

<div class="card">

  <label data-tr="PDF seç" data-en="Select PDF"></label>
  <input type="file" id="file" accept="application/pdf">

  <label data-tr="Kalite seviyesi" data-en="Quality level"></label>
  <input type="range" id="quality" class="range" min="10" max="100" value="70">

  <small data-tr="Düşük = küçük dosya, yüksek = daha iyi kalite"
         data-en="Lower = smaller file, higher = better quality"></small>

  <button onclick="compressPDF()"
          data-tr="Sıkıştır" data-en="Compress"></button>

  <div class="result" id="result">
    <p id="status"></p>
    <a id="download" href="#" download="compressed.pdf">Download</a>
  </div>

</div>

</div>

<script>
// language
function detectLang(){
  const lang = navigator.language || navigator.userLanguage;
  const isEN = lang.startsWith("en");

  document.querySelectorAll("[data-tr]").forEach(el=>{
    el.innerHTML = isEN ? el.dataset.en : el.dataset.tr;
  });
}
detectLang();

// file status UI
document.getElementById("file").addEventListener("change", function(){
  const statusText = document.getElementById("statusText");
  if(this.files.length > 0){
    statusText.innerHTML = "Dosya seçildi: " + this.files[0].name;
  } else {
    statusText.innerHTML = "Dosya seçilmedi <small>Dosyalar tarayıcı içinde işlenir, sunucuya yüklenmez.</small>";
  }
});

// mock compression
function compressPDF(){
  const file = document.getElementById("file").files[0];
  const quality = document.getElementById("quality").value;

  if(!file){
    alert("Lütfen PDF seç");
    return;
  }

  const result = document.getElementById("result");
  const status = document.getElementById("status");
  const download = document.getElementById("download");

  result.style.display = "block";

  const fakeSize = Math.round(file.size * (quality/100));

  status.innerText =
    "Sıkıştırma tamamlandı. Yeni boyut: " + (fakeSize/1024).toFixed(2) + " KB";

  download.href = URL.createObjectURL(file);
}
</script>

</body>
</html>
