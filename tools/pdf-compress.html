<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compress PDF - PDFQuickTools</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f3f4f6;
  color:#111;
}

/* HEADER = MERGE İLE AYNI */
header{
  background:#0f172a;
  color:white;
  padding:18px;
  text-align:center;
  font-weight:600;
}

/* CONTAINER */
.container{
  max-width:800px;
  margin:40px auto;
  padding:20px;
}

/* CARD = MERGE İLE AYNI */
.card{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

/* TITLE */
h1{
  margin-top:0;
}

/* INPUT */
input{
  margin:20px 0;
  padding:15px;
  width:100%;
  border:2px dashed #cbd5e1;
  border-radius:12px;
  background:#fafafa;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#1d4ed8;
}

/* NOTE */
.note{
  margin-top:15px;
  font-size:13px;
  color:#6b7280;
}

/* BACK */
.back{
  display:block;
  margin-top:20px;
  text-decoration:none;
  color:#2563eb;
  font-weight:500;
}
</style>
</head>

<body>

<header>
PDFQuickTools • Compress PDF
</header>

<div class="container">

<div class="card">

<h1 data-tr="PDF Sıkıştır" data-en="Compress PDF"></h1>
<p data-tr="PDF boyutunu düşür, kaliteyi kontrol et"
   data-en="Reduce PDF size while controlling quality"></p>

<label data-tr="PDF seç" data-en="Select PDF"></label>
<input type="file" id="file" accept="application/pdf">

<label data-tr="Kalite (10-100)" data-en="Quality (10-100)"></label>
<input type="range" id="quality" min="10" max="100" value="70">

<button onclick="compressPDF()"
        data-tr="Sıkıştır" data-en="Compress"></button>

<p class="note" id="statusText">
Dosyalar tarayıcı içinde işlenir, sunucuya yüklenmez.
</p>

<a class="back" href="/index.html">← Ana sayfa</a>

<div id="result" style="display:none;margin-top:15px;">
  <p id="status"></p>
  <a id="download" href="#" download="compressed.pdf">Download</a>
</div>

</div>

</div>

<script>
// simple language
function detectLang(){
  const lang = navigator.language || navigator.userLanguage;
  const isEN = lang.startsWith("en");

  document.querySelectorAll("[data-tr]").forEach(el=>{
    el.innerHTML = isEN ? el.dataset.en : el.dataset.tr;
  });
}
detectLang();

// status change
document.getElementById("file").addEventListener("change", function(){
  const statusText = document.getElementById("statusText");

  if(this.files.length > 0){
    statusText.innerText = "Dosya seçildi: " + this.files[0].name;
  } else {
    statusText.innerText = "Dosyalar tarayıcı içinde işlenir, sunucuya yüklenmez.";
  }
});

// mock compress
function compressPDF(){
  const file = document.getElementById("file").files[0];
  const quality = document.getElementById("quality").value;

  if(!file){
    alert("Lütfen PDF seç");
    return;
  }

  const result = document.getElementById("result");
  const status = document.getElementById("status");
  const download = document.getElementById("download");

  result.style.display = "block";

  const fakeSize = Math.round(file.size * (quality/100));

  status.innerText =
    "Sıkıştırma tamamlandı. Yeni boyut: " + (fakeSize/1024).toFixed(2) + " KB";

  download.href = URL.createObjectURL(file);
}
</script>

</body>
</html>
