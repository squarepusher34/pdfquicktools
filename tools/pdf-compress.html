<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compress PDF - PDFQuickTools</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f3f4f6;
  color:#111;
}

header{
  background:#0f172a;
  color:white;
  padding:18px;
  text-align:center;
  font-weight:600;
}

.container{
  max-width:800px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

h1{
  margin-top:0;
}

input{
  margin:20px 0;
  padding:15px;
  width:100%;
  border:2px dashed #cbd5e1;
  border-radius:12px;
  background:#fafafa;
}

button{
  width:100%;
  padding:14px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#1d4ed8;
}

.note{
  margin-top:15px;
  font-size:13px;
  color:#6b7280;
}

.back{
  display:block;
  margin-top:20px;
  text-decoration:none;
  color:#2563eb;
  font-weight:500;
}

#result{
  margin-top:15px;
  display:none;
}
</style>
</head>

<body>

<header>
PDFQuickTools • Compress PDF
</header>

<div class="container">

<div class="card">

<h1>PDF Sıkıştır</h1>
<p>PDF boyutunu düşür</p>

<input type="file" id="file" accept="application/pdf">

<button onclick="compressPDF()">Sıkıştır</button>

<p class="note" id="statusText">
Dosyalar tarayıcı içinde işlenir, sunucuya yüklenmez.
</p>

<a class="back" href="/index.html">← Ana sayfa</a>

<div id="result">
  <p id="status"></p>
  <a id="download" href="#" download="compressed.pdf">Download</a>
</div>

</div>

</div>

<script>
async function compressPDF() {

  const file = document.getElementById("file").files[0];

  if (!file) {
    alert("PDF seç");
    return;
  }

  const status = document.getElementById("status");
  const result = document.getElementById("result");
  const download = document.getElementById("download");

  result.style.display = "block";
  status.innerText = "Yükleniyor...";

  const reader = new FileReader();

  reader.onload = async function () {

    const base64 = reader.result.split(",")[1];

    try {

      const res = await fetch("/api/compress", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ file: base64 })
      });

      const data = await res.json();

      if (!data.jobId) {
        status.innerText = "Hata ❌ jobId gelmedi";
        return;
      }

      status.innerText = "İşleniyor...";

      const jobId = data.jobId;

      const interval = setInterval(async () => {

        const r = await fetch(`/api/status?jobId=${jobId}`);
        const d = await r.json();

        if (d.status === "done" || d.status === "completed") {

          clearInterval(interval);

          const url =
            d.downloadUri ||
            d.result?.downloadUri ||
            d.asset?.downloadUri;

          if (!url) {
            status.innerText = "Download link bulunamadı ❌";
            return;
          }

          download.href = url;
          download.style.display = "block";

          status.innerText = "Tamamlandı ✔";
        }

      }, 3000);

    } catch (err) {
      console.error(err);
      status.innerText = "Hata oluştu ❌";
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
