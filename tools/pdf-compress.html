<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Compress</title>

<style>
body {
  font-family: system-ui;
  background: #f3f4f6;
  margin: 0;
}

.container {
  max-width: 700px;
  margin: 60px auto;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

input {
  width: 100%;
  padding: 15px;
  border: 2px dashed #ccc;
  margin: 20px 0;
}

button {
  width: 100%;
  padding: 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

#status {
  margin-top: 15px;
}

a {
  display: none;
  margin-top: 15px;
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>PDF Compressor</h2>

<input type="file" id="file" accept="application/pdf" />

<button onclick="compressPDF()">Sıkıştır</button>

<p id="status"></p>

<a id="download">Download PDF</a>

</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- pdf-lib -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
async function compressPDF() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("PDF seç");

  const status = document.getElementById("status");
  const download = document.getElementById("download");

  status.innerText = "İşleniyor...";

  const arrayBuffer = await file.arrayBuffer();

  const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
  const pdf = await loadingTask.promise;

  const { PDFDocument } = PDFLib;
  const newPdf = await PDFDocument.create();

  for (let i = 1; i <= pdf.numPages; i++) {
    status.innerText = `Sayfa ${i}/${pdf.numPages}`;

    const page = await pdf.getPage(i);

    const viewport = page.getViewport({ scale: 1.3 });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext: ctx,
      viewport: viewport,
    }).promise;

    const imgData = canvas.toDataURL("image/jpeg", 0.7);

    const img = await newPdf.embedJpg(imgData);

    const pdfPage = newPdf.addPage([viewport.width, viewport.height]);

    pdfPage.drawImage(img, {
      x: 0,
      y: 0,
      width: viewport.width,
      height: viewport.height,
    });
  }

  const pdfBytes = await newPdf.save();

  const blob = new Blob([pdfBytes], { type: "application/pdf" });
  const url = URL.createObjectURL(blob);

  download.href = url;
  download.download = "compressed.pdf";
  download.style.display = "inline-block";
  download.innerText = "Download PDF";

  status.innerText = "Tamamlandı ✔";
}
</script>

</body>
</html>
