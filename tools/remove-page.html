<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PDF Sayfa Sil | PDFQuickTools</title>
<link rel="canonical" href="https://pdfquicktools.net/tools/remove-page.html">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
:root{
  --ink:#15172b;
  --paper:#faf7f2;
  --card:#fff;
  --coral:#ff5a4e;
  --coral-deep:#df4538;
  --muted:#716c63;
  --border:#e8e2d8;
  --shadow:0 10px 28px -14px rgba(21,23,43,.16);
  --mono: monospace;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--paper);
  color:var(--ink);
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:rgba(21,23,43,.95);
  color:#fff;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

header a{
  color:#fff;
  text-decoration:none;
  font-size:14px;
  opacity:.85;
}

header a:hover{
  opacity:1;
}

/* CONTAINER */
.container{
  max-width:680px;
  margin:40px auto;
  padding:0 20px;
}

/* CARD */
.ticket{
  background:var(--card);
  padding:24px;
  border-radius:12px;
  box-shadow:var(--shadow);
}

h1{
  text-align:center;
  margin-top:0;
}

.lede{
  text-align:center;
  color:var(--muted);
  font-size:14px;
}

/* INPUTS */
input[type=file],
input[type=text]{
  width:100%;
  padding:12px;
  margin-top:14px;
  border:1px solid var(--border);
  border-radius:10px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:14px;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  background:var(--coral);
  color:#fff;
}

button:hover{
  background:var(--coral-deep);
}

/* HOME BUTTON */
.home-btn{
  display:block;
  margin-top:12px;
  text-align:center;
  padding:14px;
  border-radius:10px;
  background:#eee;
  color:#15172b;
  text-decoration:none;
  font-weight:bold;
}

.home-btn:hover{
  background:#ddd;
}

/* STATUS */
#status{
  text-align:center;
  margin-top:12px;
  font-family:var(--mono);
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <a class="brand" href="../index.html">PDFQuickTools</a>
  <a href="../index.html">Home</a>
</header>

<div class="container">

  <div class="ticket">

    <h1>PDF Sayfa Sil</h1>
    <p class="lede">Örnek: 2, 5, 8-10</p>

    <input type="file" id="file" accept="application/pdf">
    <input type="text" id="pages" placeholder="2,5,8-10">

    <button onclick="deletePages()">Sayfaları Sil</button>

    <!-- 👇 ANA SAYFA BUTONU -->
    <a href="../index.html" class="home-btn">Ana Sayfa</a>

    <p id="status"></p>

  </div>

</div>

<script>
function status(x){
  document.getElementById("status").innerText = x;
}

async function deletePages(){

  const file=document.getElementById("file").files[0];
  if(!file) return alert("PDF seç");

  const txt=document.getElementById("pages").value.trim();
  if(!txt) return alert("Sayfa gir");

  status("Yükleniyor...");

  const pdf=await PDFLib.PDFDocument.load(await file.arrayBuffer());
  const total=pdf.getPageCount();

  let remove=[];

  txt.split(",").forEach(p=>{
    p=p.trim();

    if(p.includes("-")){
      let [a,b]=p.split("-").map(Number);
      for(let i=a;i<=b;i++) remove.push(i);
    } else {
      remove.push(Number(p));
    }
  });

  remove=[...new Set(remove)].sort((a,b)=>b-a);

  status("Sayfalar siliniyor...");

  remove.forEach(p=>{
    if(p>=1 && p<=total){
      pdf.removePage(p-1);
    }
  });

  const bytes=await pdf.save();
  const blob=new Blob([bytes],{type:"application/pdf"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="pages-deleted.pdf";
  a.click();

  status("Tamamlandı ✔");
}
</script>

</body>
</html>
