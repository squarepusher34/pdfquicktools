<script>

async function previewPDF(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("PDF seç");

  const arrayBuffer = await file.arrayBuffer();

  const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise;

  const page = await pdf.getPage(1);
  const viewport = page.getViewport({scale:1.2});

  const canvas = document.getElementById("preview");
  const ctx = canvas.getContext("2d");

  canvas.width = viewport.width;
  canvas.height = viewport.height;

  await page.render({
    canvasContext: ctx,
    viewport: viewport
  }).promise;

  document.getElementById("status").innerText = "Önizleme hazır ✔";
}

async function rotatePDF(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("PDF seç");

  const rotation = parseInt(document.getElementById("rotation").value);

  const arrayBuffer = await file.arrayBuffer();
  const { PDFDocument, degrees } = PDFLib;

  const pdfDoc = await PDFDocument.load(arrayBuffer);
  const pages = pdfDoc.getPages();

  pages.forEach(p => p.setRotation(degrees(rotation)));

  const pdfBytes = await pdfDoc.save();

  const blob = new Blob([pdfBytes], {type:"application/pdf"});
  const url = URL.createObjectURL(blob);

  const download = document.getElementById("download");
  download.href = url;
  download.download = "rotated.pdf";
  download.innerText = "Download PDF ✔";

  document.getElementById("status").innerText = "Tamamlandı ✔";
}

</script>
