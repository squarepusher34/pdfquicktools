<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15172b" />

    <title>PDF Döndür - PDFQuickTools</title>
    <meta name="description" content="PDF sayfalarını ücretsiz döndür ve önizle" />

    <!-- GOOGLE FONTS CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ADSENSE -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6722827238956891"
      crossorigin="anonymous"
    ></script>

    <!-- PDF LIB -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <!-- PDF.JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>

    <style>
      /* ---------- tokens ---------- */
      :root {
        --ink: #15172b;
        --paper: #faf7f2;
        --card: #ffffff;
        --coral: #ff5a4e;
        --coral-deep: #df4538;
        --blue: #3b6fed;
        --amber: #f2a93b;
        --amber-deep: #c97f12;
        --muted: #716c63;
        --border: #e8e2d8;
        --green: #1f9d6b;

        --display: "Fraunces", serif;
        --body: "Inter", system-ui, sans-serif;
        --mono: "IBM Plex Mono", monospace;

        --container: 680px;
        --shadow-soft: 0 10px 28px -14px rgba(21, 23, 43, 0.16);
        --shadow-lift: 0 20px 40px -16px rgba(21, 23, 43, 0.22);
      }

      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: var(--body);
        background: var(--paper);
        background-image: radial-gradient(
          circle at 1px 1px,
          rgba(21, 23, 43, 0.05) 1px,
          transparent 0
        );
        background-size: 16px 16px;
        color: var(--ink);
        line-height: 1.6;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      *:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 3px;
        border-radius: 6px;
      }

      /* ---------- header ---------- */
      header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(21, 23, 43, 0.94);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .header-inner {
        max-width: 1180px;
        margin: 0 auto;
        padding: 10px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: var(--display);
        font-weight: 600;
        font-size: 18px;
        color: #fff;
        letter-spacing: -0.01em;
      }
      .brand-mark {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(160deg, var(--coral), var(--coral-deep));
        padding: 6px 7px 5px;
        border-radius: 5px;
        letter-spacing: 0.03em;
        clip-path: polygon(0 0, 75% 0, 100% 35%, 100% 100%, 0 100%);
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .nav-links a {
        color: rgba(255, 255, 255, 0.82);
        font-size: 14px;
        font-weight: 500;
        padding: 8px 12px;
        border-radius: 8px;
        transition: background 0.2s, color 0.2s;
      }
      .nav-links a:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }

      /* ---------- ad blocks ---------- */
      .ad-block {
        max-width: 1180px;
        margin: 6px auto 0;
        padding-inline: 24px;
        text-align: center;
      }

      /* ---------- main container ---------- */
      .container {
        max-width: var(--container);
        margin: 10px auto 50px;
        padding-inline: 24px;
        box-sizing: border-box;
      }

      /* ---------- ticket card ---------- */
      .ticket {
        position: relative;
        background: var(--card);
        border-radius: 0 0 10px 10px;
        padding: 24px 28px 28px;
        box-shadow: var(--shadow-soft);
        box-sizing: border-box;
        clip-path: polygon(
          0% 0%,
          100% 0%,
          100% 98%,
          96% 100%,
          92% 98%,
          88% 100%,
          84% 98%,
          80% 100%,
          76% 98%,
          72% 100%,
          68% 98%,
          64% 100%,
          60% 98%,
          56% 100%,
          52% 98%,
          48% 100%,
          44% 98%,
          40% 100%,
          36% 98%,
          32% 100%,
          28% 98%,
          24% 100%,
          20% 98%,
          16% 100%,
          12% 98%,
          8% 100%,
          4% 98%,
          0% 100%
        );
      }

      .eyebrow {
        font-family: var(--mono);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--blue);
        margin: 0 0 8px;
        text-align: center;
      }

      h1 {
        font-family: var(--display);
        font-weight: 600;
        font-size: clamp(1.5rem, 4vw, 1.9rem);
        letter-spacing: -0.01em;
        margin: 0 0 6px;
        text-align: center;
      }

      .lede {
        color: var(--muted);
        font-size: 0.92rem;
        margin: 0 0 18px;
        text-align: center;
      }

      /* ---------- upload zone ---------- */
      .file-input-wrapper {
        position: relative;
        margin-bottom: 14px;
      }

      input[type="file"] {
        width: 100%;
        padding: 22px 20px;
        border: 2px dashed var(--border);
        border-radius: 12px;
        background: var(--paper);
        font-family: var(--body);
        font-size: 14px;
        color: var(--muted);
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        box-sizing: border-box;
      }

      input[type="file"]:hover {
        border-color: var(--coral);
        background: rgba(255, 90, 78, 0.02);
      }

      /* ---------- rotation select ---------- */
      .rotation-box {
        text-align: left;
        margin-bottom: 14px;
      }

      .rotation-box label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 6px;
      }

      select {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--paper);
        font-family: var(--body);
        font-size: 14px;
        color: var(--ink);
        cursor: pointer;
        box-sizing: border-box;
        appearance: none;
        -webkit-appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23716c63' stroke-width='2'><polyline points='6 9 12 15 18 9'></polyline></svg>");
        background-repeat: no-repeat;
        background-position: right 16px center;
        padding-right: 40px;
      }

      select:hover {
        border-color: var(--coral);
      }

      /* ---------- buttons ---------- */
      .button-row {
        display: flex;
        gap: 12px;
        margin-bottom: 4px;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-family: var(--body);
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      button.primary {
        background: linear-gradient(160deg, var(--coral), var(--coral-deep));
        color: white;
        box-shadow: 0 4px 12px rgba(223, 69, 56, 0.2);
      }

      button.primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(223, 69, 56, 0.3);
      }

      button.secondary {
        background: var(--paper);
        color: var(--ink);
        border: 1px solid var(--border);
      }

      button.secondary:hover {
        border-color: var(--blue);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      /* ---------- preview ---------- */
      .preview-box {
        width: 100%;
        overflow: auto;
        display: flex;
        justify-content: center;
        margin-top: 14px;
      }

      #preview {
        display: block;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: white;
        max-width: 100%;
      }

      /* ---------- perforation ---------- */
      .perforation {
        height: 3px;
        margin: 20px 0 16px;
        background-image: radial-gradient(
          circle,
          var(--paper) 1.6px,
          transparent 1.7px
        );
        background-size: 11px 100%;
        background-repeat: repeat-x;
      }

      /* ---------- footer elements ---------- */
      .note {
        font-size: 13px;
        color: var(--muted);
        text-align: center;
        margin: 0 0 16px;
      }

      .back {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        font-size: 14px;
        color: var(--muted);
        font-weight: 500;
        transition: color 0.2s;
      }

      .back:hover {
        color: var(--ink);
      }

      /* ---------- status & download ---------- */
      #status {
        margin-top: 10px;
        font-family: var(--mono);
        font-size: 13px;
        color: var(--amber-deep);
        text-align: center;
        min-height: 18px;
      }

      a#download {
        display: none;
        margin-top: 8px;
        padding: 14px;
        border-radius: 12px;
        background: rgba(31, 157, 107, 0.1);
        border: 1px solid rgba(31, 157, 107, 0.3);
        color: var(--green);
        font-weight: 600;
        font-size: 15px;
        text-align: center;
      }

      /* ---------- mobile ad ---------- */
      .mobile-ad {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--card);
        text-align: center;
        padding: 6px;
        box-shadow: 0 -2px 10px rgba(21, 23, 43, 0.1);
        z-index: 9999;
        display: none;
      }

      @media (max-width: 768px) {
        .mobile-ad {
          display: block;
        }
        body {
          padding-bottom: 80px;
        }
        .button-row {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-inner">
        <a href="/" class="brand">
          <span class="brand-mark">PDF</span> PDFQuickTools
        </a>
        <div class="nav-links">
          <a href="/">Ana Sayfa</a>
        </div>
      </div>
    </header>

    <!-- ADS TOP -->
    <div class="ad-block">
      <ins
        class="adsbygoogle"
        style="display: block"
        data-ad-client="ca-pub-6722827238956891"
        data-ad-slot="1111111111"
        data-ad-format="auto"
      ></ins>
    </div>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <div class="container">
      <div class="ticket">
        <div class="eyebrow">PDF ARAÇLARI</div>
        <h1>PDF Döndür + Önizle</h1>
        <p class="lede">PDF dosyanı seç, açıyı belirle, önizle ve indir</p>

        <div class="file-input-wrapper">
          <input type="file" id="file" accept="application/pdf" />
        </div>

        <div class="rotation-box">
          <label for="rotation">Döndürme açısı</label>
          <select id="rotation">
            <option value="0">0°</option>
            <option value="90">90°</option>
            <option value="180">180°</option>
            <option value="270">270°</option>
          </select>
        </div>

        <div class="button-row">
          <button class="secondary" onclick="previewPDF()">Önizle</button>
          <button class="primary" onclick="rotatePDF()">Döndür & İndir</button>
        </div>

        <div class="preview-box">
          <canvas id="preview"></canvas>
        </div>

        <p id="status"></p>
        <a id="download"></a>

        <div class="perforation"></div>

        <p class="note">Dosyalar tarayıcı içinde işlenir, sunucuya yüklenmez.</p>

        <a class="back" href="/">← Ana sayfa</a>
      </div>
    </div>

    <!-- MOBILE ADS -->
    <div class="mobile-ad">
      <ins
        class="adsbygoogle"
        style="display: block"
        data-ad-client="ca-pub-6722827238956891"
        data-ad-slot="4444444444"
        data-ad-format="auto"
        data-full-width-responsive="true"
      ></ins>
    </div>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <script>
      async function previewPDF() {
        const file = document.getElementById("file").files[0];
        if (!file) {
          alert("PDF seç");
          return;
        }

        const status = document.getElementById("status");
        status.innerText = "Önizleme hazırlanıyor...";

        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const page = await pdf.getPage(1);

        const canvas = document.getElementById("preview");
        const ctx = canvas.getContext("2d");

        const rotation = parseInt(document.getElementById("rotation").value);
        const viewport = page.getViewport({ scale: 1.5, rotation });

        // container'a göre fit
        const containerWidth = document.querySelector(".ticket").clientWidth;
        const scale = containerWidth / viewport.width;
        const scaledViewport = page.getViewport({ scale, rotation });

        const dpr = window.devicePixelRatio || 1;

        canvas.width = scaledViewport.width * dpr;
        canvas.height = scaledViewport.height * dpr;

        canvas.style.width = scaledViewport.width + "px";
        canvas.style.height = scaledViewport.height + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        await page.render({
          canvasContext: ctx,
          viewport: scaledViewport,
        }).promise;

        status.innerText = "Önizleme hazır ✔";
      }

      async function rotatePDF() {
        const file = document.getElementById("file").files[0];
        if (!file) {
          alert("PDF seç");
          return;
        }

        const status = document.getElementById("status");
        status.innerText = "İşleniyor...";

        const rotation = parseInt(document.getElementById("rotation").value);
        const arrayBuffer = await file.arrayBuffer();

        const { PDFDocument, degrees } = PDFLib;
        const pdfDoc = await PDFDocument.load(arrayBuffer);
        const pages = pdfDoc.getPages();

        pages.forEach((page) => {
          page.setRotation(degrees(rotation));
        });

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        const download = document.getElementById("download");
        download.href = url;
        download.download = "dondurulmus.pdf";
        download.innerText = "PDF'i İndir ✔";
        download.style.display = "block";

        status.innerText = "Tamamlandı ✔";
      }
    </script>
  </body>
</html>
