ne; } *:focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; border-radius: 6px; } /* ---------- header ---------- */ header { position: sticky; top: 0; z-index: 50; background: rgba(21, 23, 43, 0.94); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); } .header-inner { max-width: 1180px; margin: 0 auto; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; } .brand { display: flex; align-items: center; gap: 10px; font-family: var(--display); font-weight: 600; font-size: 18px; color: #fff; letter-spacing: -0.01em; } .brand-mark { font-family: var(--mono); font-size: 10px; font-weight: 600; color: #fff; background: linear-gradient(160deg, var(--coral), var(--coral-deep)); padding: 6px 7px 5px; border-radius: 5px; letter-spacing: 0.03em; clip-path: polygon(0 0, 75% 0, 100% 35%, 100% 100%, 0 100%); } .nav-links { display: flex; align-items: center; gap: 4px; } .nav-links a { color: rgba(255, 255, 255, 0.82); font-size: 14px; font-weight: 500; padding: 8px 12px; border-radius: 8px; transition: background 0.2s, color 0.2s; } .nav-links a:hover { background: rgba(255, 255, 255, 0.08); color: #fff; } /* ---------- ad block ---------- */ .ad-block { max-width: 1180px; margin: 12px auto 0; padding-inline: 24px; text-align: center; } /* ---------- main container ---------- */ .container { max-width: var(--container); margin: 20px auto 60px; padding-inline: 24px; box-sizing: border-box; } /* ---------- ticket card ---------- */ .ticket { position: relative; background: var(--card); border-radius: 0 0 10px 10px; padding: 40px 32px 32px; box-shadow: var(--shadow-soft); box-sizing: border-box; clip-path: polygon( 0% 0%, 100% 0%, 100% 98%, 96% 100%, 92% 98%, 88% 100%, 84% 98%, 80% 100%, 76% 98%, 72% 100%, 68% 98%, 64% 100%, 60% 98%, 56% 100%, 52% 98%, 48% 100%, 44% 98%, 40% 100%, 36% 98%, 32% 100%, 28% 98%, 24% 100%, 20% 98%, 16% 100%, 12% 98%, 8% 100%, 4% 98%, 0% 100% ); } .eyebrow { font-family: var(--mono); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); margin: 0 0 12px; text-align: center; } h1 { font-family: var(--display); font-weight: 600; font-size: clamp(1.8rem, 4vw, 2.4rem); letter-spacing: -0.01em; margin: 0 0 8px; text-align: center; } .lede { color: var(--muted); font-size: 1rem; margin: 0 0 28px; text-align: center; } /* ---------- upload zone ---------- */ .file-input-wrapper { position: relative; margin-bottom: 18px; } input[type="file"] { width: 100%; padding: 36px 20px; border: 2px dashed var(--border); border-radius: 12px; background: var(--paper); font-family: var(--body); font-size: 14px; color: var(--muted); cursor: pointer; transition: border-color 0.2s, background 0.2s; box-sizing: border-box; } input[type="file"]:hover { border-color: var(--coral); background: rgba(255, 90, 78, 0.02); } /* ---------- text input ---------- */ .field { margin-bottom: 16px; text-align: left; } .field label { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; } .field label span { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--coral-deep); } input[type="text"] { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; background: var(--paper); font-family: var(--body); font-size: 14px; color: var(--ink); box-sizing: border-box; } input[type="text"]:focus { border-color: var(--blue); outline: none; } /* ---------- color + sliders row ---------- */ .color-row { display: flex; align-items: center; gap: 12px; } input[type="color"] { width: 52px; height: 44px; padding: 2px; border: 1px solid var(--border); border-radius: 10px; background: var(--paper); cursor: pointer; flex-shrink: 0; } input[type="range"] { width: 100%; height: 6px; border-radius: 999px; background: var(--border); appearance: none; -webkit-appearance: none; cursor: pointer; margin: 0; } input[type="range"]::-webkit-slider-thumb { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--coral); border: 3px solid white; box-shadow: 0 2px 6px rgba(223, 69, 56, 0.35); cursor: pointer; } input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--coral); border: 3px solid white; box-shadow: 0 2px 6px rgba(223, 69, 56, 0.35); cursor: pointer; } /* ---------- buttons ---------- */ .button-row { display: flex; gap: 12px; margin-top: 22px; margin-bottom: 8px; } button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-family: var(--body); font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; } button.primary { background: linear-gradient(160deg, var(--coral), var(--coral-deep)); color: white; box-shadow: 0 4px 12px rgba(223, 69, 56, 0.2); } button.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(223, 69, 56, 0.3); } button.secondary { background: var(--paper); color: var(--ink); border: 1px solid var(--border); } button.secondary:hover { border-color: var(--blue); transform: translateY(-1px); } button:active { transform: translateY(1px); } /* ---------- preview ---------- */ .preview-box { width: 100%; overflow: auto; display: flex; justify-content: center; margin-top: 22px; } #preview { width: 100%; display: block; border: 1px solid var(--border); border-radius: 10px; background: white; } /* ---------- perforation ---------- */ .perforation { height: 3px; margin: 28px 0 24px; background-image: radial-gradient( circle, var(--paper) 1.6px, transparent 1.7px ); background-size: 11px 100%; background-repeat: repeat-x; } /* ---------- footer elements ---------- */ .note { font-size: 13px; color: var(--muted); text-align: center; margin: 0 0 24px; } .back { display: inline-flex; align-items: center; justify-content: center; width: 100%; font-size: 14px; color: var(--muted); font-weight: 500; transition: color 0.2s; } .back:hover { color: var(--ink); } /* ---------- status & download ---------- */ #status { margin-top: 16px; font-family: var(--mono); font-size: 13px; color: var(--amber-deep); text-align: center; min-height: 18px; } a#download { display: none; margin-top: 8px; padding: 14px; border-radius: 12px; background: rgba(31, 157, 107, 0.1); border: 1px solid rgba(31, 157, 107, 0.3); color: var(--green); font-weight: 600; font-size: 15px; text-align: center; } @media (max-width: 768px) { .button-row { flex-direction: column; } } </style> </head> <body> <header> <div class="header-inner"> <a href="/" class="brand"> <span class="brand-mark">PDF</span> PDFQuickTools </a> <div class="nav-links"> <a href="/">Ana Sayfa</a> </div> </div> </header> <!-- AD --> <div class="ad-block"> <ins class="adsbygoogle" style="display: block" data-ad-client="ca-pub-6722827238956891" data-ad-slot="1111111111" data-ad-format="auto" ></ins> </div> <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script> <div class="container"> <div class="ticket"> <div class="eyebrow">PDF ARAÇLARI</div> <h1>PDF Filigran Ekle</h1> <p class="lede">PDF'ine hızlıca filigran ekle ve indir</p> <div class="file-input-wrapper"> <input type="file" id="file" accept="application/pdf" /> </div> <div class="field"> <label>Filigran yazısı</label> <input type="text" id="text" placeholder="Örn: GİZLİ, KOPYALANAMAZ" /> </div> <div class="field"> <label>Renk</label> <div class="color-row"> <input type="color" id="color" value="#888888" /> </div> </div> <div class="field"> <label>Opaklık <span id="opacityValue">30</span>%</label> <input type="range" id="opacity" min="10" max="100" value="30" /> </div> <div class="field"> <label>Yazı boyutu <span id="sizeValue">50</span>px</label> <input type="range" id="size" min="20" max="120" value="50" /> </div> <div class="field"> <label>Açı <span id="rotationValue">45</span>°</label> <input type="range" id="rotation" min="0" max="360" value="45" /> </div> <div class="button-row"> <button class="secondary" onclick="preview()">Önizle</button> <button class="primary" onclick="createPDF()">Uygula & İndir</button> </div> <div class="preview-box"> <canvas id="preview"></canvas> </div> <p id="status"></p> <a id="download"></a> <div class="perforation"></div> <p class="note">İşlem tamamen cihazında yapılır, sunucuya yüklenmez.</p> <a class="back" href="/">← Ana sayfa</a> </div> </div> <script> const opacitySlider = document.getElementById("opacity"); const sizeSlider = document.getElementById("size"); const rotationSlider = document.getElementById("rotation"); opacitySlider.addEventListener("input", () => { document.getElementById("opacityValue").innerText = opacitySlider.value; }); sizeSlider.addEventListener("input", () => { document.getElementById("sizeValue").innerText = sizeSlider.value; }); rotationSlider.addEventListener("input", () => { document.getElementById("rotationValue").innerText = rotationSlider.value; }); async function preview() { const file = document.getElementById("file").files[0]; if (!file) { alert("PDF seç"); return; } const status = document.getElementById("status"); status.innerText = "Önizleme hazırlanıyor..."; const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise; const page = await pdf.getPage(1); const viewport = page.getViewport({ scale: 1.6 }); const canvas = document.getElementById("preview"); const ctx = canvas.getContext("2d"); canvas.width = viewport.width; canvas.height = viewport.height; await page.render({ canvasContext: ctx, viewport }).promise; drawWatermark(ctx, canvas); status.innerText = "Önizleme hazır ✔"; } function drawWatermark(ctx, canvas) { const text = document.getElementById("text").value || "FİLİGRAN"; const color = document.getElementById("color").value; const opacity = document.getElementById("opacity").value / 100; const size = document.getElementById("size").value; const rotation = document.getElementById("rotation").value; ctx.save(); ctx.translate(canvas.width / 2, canvas.height / 2); ctx.rotate((rotation * Math.PI) / 180); ctx.globalAlpha = opacity; ctx.fillStyle = color; ctx.font = ${size}px Arial; ctx.textAlign = "center"; ctx.fillText(text, 0, 0); ctx.restore(); } async function createPDF() { const file = document.getElementById("file").files[0]; if (!file) { alert("PDF seç"); return; } const status = document.getElementById("status"); status.innerText = "İşleniyor..."; const pdfDoc = await PDFLib.PDFDocument.load(await file.arrayBuffer()); const pages = pdfDoc.getPages(); const text = document.getElementById("text").value || "FİLİGRAN"; const opacity = document.getElementById("opacity").value / 100; const size = document.getElementById("size").value; const rotation = document.getElementById("rotation").value; pages.forEach((page) => { const { width, height } = page.getSize(); page.drawText(text, { x: width / 2, y: height / 2, size: parseInt(size), opacity: opacity, rotate: PDFLib.degrees(parseInt(rotation)), color: PDFLib.rgb(0.5, 0.5, 0.5), }); }); const bytes = await pdfDoc.save(); const blob = new Blob([bytes], { type: "application/pdf" }); const url = URL.createObjectURL(blob); const download = document.getElementById("download"); download.href = url; download.download = "filigranli.pdf"; download.style.display = "block"; download.innerText = "PDF'i İndir ✔"; status.innerText = "Tamamlandı ✔"; } </script> </body> </html>
