<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15172b" />

    <title>PDF Watermark | PDFQuickTools</title>
    <meta name="description" content="Add watermark to your PDF instantly" />

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ADSENSE -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6722827238956891"
      crossorigin="anonymous"
    ></script>

    <!-- PDF LIB -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>

    <style>
      :root {
        --ink: #15172b;
        --paper: #faf7f2;
        --card: #ffffff;
        --coral: #ff5a4e;
        --coral-deep: #df4538;
        --blue: #3b6fed;
        --muted: #716c63;
        --border: #e8e2d8;
        --green: #1f9d6b;

        --display: "Fraunces", serif;
        --body: "Inter", system-ui, sans-serif;
        --mono: "IBM Plex Mono", monospace;

        --container: 680px;
        --shadow-soft: 0 10px 28px -14px rgba(21, 23, 43, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--body);
        background: var(--paper);
        color: var(--ink);
        line-height: 1.6;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* HEADER */
      header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(21, 23, 43, 0.96);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        padding: 10px 20px; /* 👈 DAHA SIKI */
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .brand {
        color: #fff;
        font-weight: 600;
        font-family: var(--display);
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .brand-mark {
        font-family: var(--mono);
        font-size: 10px;
        background: linear-gradient(160deg, var(--coral), var(--coral-deep));
        padding: 5px 6px;
        border-radius: 5px;
      }

      .nav-links a {
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
      }

      /* AD */
      .ad-block {
        max-width: 1100px;
        margin: 6px auto 0; /* 👈 ÜST BOŞLUK AZALTILDI */
        text-align: center;
      }

      /* CONTAINER */
      .container {
        max-width: var(--container);
        margin: 16px auto 40px; /* 👈 ÜST BOŞLUK AZALTILDI */
        padding: 0 20px;
      }

      .ticket {
        background: var(--card);
        border-radius: 12px;
        padding: 28px 24px;
        box-shadow: var(--shadow-soft);
      }

      h1 {
        text-align: center;
        margin: 0 0 8px;
        font-family: var(--display);
      }

      .lede {
        text-align: center;
        color: var(--muted);
        margin-bottom: 20px;
      }

      input,
      select {
        width: 100%;
        margin-bottom: 14px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        font-family: var(--body);
      }

      .button-row {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        background: var(--coral);
        color: white;
      }

      .secondary {
        background: #f1f1f1;
      }

      .back {
        display: block;
        text-align: center;
        margin-top: 16px;
        color: var(--muted);
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-inner">
        <a class="brand" href="../index.html">
          <span class="brand-mark">PDF</span> PDFQuickTools
        </a>

        <div class="nav-links">
          <a href="../index.html">Home</a>
        </div>
      </div>
    </header>

    <!-- AD -->
    <div class="ad-block">
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-6722827238956891"
        data-ad-slot="1111111111"
        data-ad-format="auto"></ins>
    </div>

    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <div class="container">
      <div class="ticket">
        <h1>PDF Watermark</h1>
        <p class="lede">Add watermark to your PDF instantly</p>

        <input type="file" id="file" accept="application/pdf" />

        <input type="text" id="text" placeholder="e.g. CONFIDENTIAL" />

        <input type="color" id="color" value="#888888" />

        <input type="range" id="opacity" min="10" max="100" value="30" />

        <input type="range" id="size" min="20" max="120" value="50" />

        <input type="range" id="rotation" min="0" max="360" value="45" />

        <div class="button-row">
          <button class="secondary" onclick="preview()">Preview</button>
          <button class="primary" onclick="createPDF()">Apply & Download</button>
        </div>

        <canvas id="preview"></canvas>

        <p id="status"></p>
        <a id="download"></a>

        <a class="back" href="../index.html">← Home</a>
      </div>
    </div>

    <script>
      // JS aynı kalabilir (değiştirmedim)
    </script>
  </body>
</html>
