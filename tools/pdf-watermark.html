<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#15172b" />

<title>PDF Watermark | PDFQuickTools</title>
<meta name="description" content="Add watermark to your PDF instantly" />

<!-- FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6722827238956891" crossorigin="anonymous"></script>

<!-- PDF LIB -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<!-- PDF.js (DOĞRU SIRA) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<style>
:root{
  --ink:#15172b;
  --paper:#faf7f2;
  --card:#fff;
  --coral:#ff5a4e;
  --coral-deep:#df4538;
  --blue:#3b6fed;
  --muted:#716c63;
  --border:#e8e2d8;
  --green:#1f9d6b;

  --display:'Fraunces',serif;
  --body:'Inter',sans-serif;
  --mono:'IBM Plex Mono',monospace;

  --container:680px;
  --shadow:0 10px 28px -14px rgba(21,23,43,.16);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:var(--body);
  background:var(--paper);
  color:var(--ink);
  line-height:1.6;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(21,23,43,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.08);
}

.header-inner{
  max-width:1100px;
  margin:0 auto;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  color:#fff;
  display:flex;
  gap:8px;
  font-family:var(--display);
  font-weight:600;
}

.brand-mark{
  font-family:var(--mono);
  font-size:10px;
  background:linear-gradient(160deg,var(--coral),var(--coral-deep));
  padding:5px 6px;
  border-radius:5px;
}

.nav-links a{
  color:rgba(255,255,255,.8);
  font-size:14px;
  text-decoration:none;
}

/* AD */
.ad-block{
  max-width:1100px;
  margin:6px auto 0;
  text-align:center;
}

/* CONTAINER */
.container{
  max-width:var(--container);
  margin:14px auto 40px;
  padding:0 20px;
}

/* CARD */
.ticket{
  background:var(--card);
  padding:28px 24px;
  border-radius:12px;
  box-shadow:var(--shadow);
}

h1{
  text-align:center;
  font-family:var(--display);
  margin:0 0 6px;
}

.lede{
  text-align:center;
  color:var(--muted);
  margin-bottom:18px;
}

input,select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid var(--border);
  border-radius:10px;
}

/* BUTTONS */
.button-row{
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.primary{
  background:var(--coral);
  color:#fff;
}

.secondary{
  background:#eee;
}

/* PREVIEW */
.preview-box{
  margin-top:18px;
  display:flex;
  justify-content:center;
}

canvas{
  max-width:100%;
  border:1px solid var(--border);
  border-radius:10px;
}

/* STATUS */
#status{
  text-align:center;
  margin-top:10px;
  font-family:var(--mono);
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin-top:16px;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <a href="../index.html" class="brand">
      <span class="brand-mark">PDF</span> PDFQuickTools
    </a>

    <nav class="nav-links">
      <a href="../index.html">Home</a>
    </nav>
  </div>
</header>

<!-- AD -->
<div class="ad-block">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="ca-pub-6722827238956891"
    data-ad-slot="1111111111"
    data-ad-format="auto"></ins>
</div>

<script>
  (adsbygoogle = window.adsbygoogle || []).push({});
</script>

<div class="container">

  <div class="ticket">
    <h1>PDF Watermark</h1>
    <p class="lede">Add watermark to your PDF instantly</p>

    <input type="file" id="file" accept="application/pdf">

    <input type="text" id="text" placeholder="Watermark text">

    <input type="color" id="color">

    <input type="range" id="opacity" min="10" max="100" value="30">

    <input type="range" id="size" min="20" max="120" value="50">

    <input type="range" id="rotation" min="0" max="360" value="45">

    <div class="button-row">
      <button class="secondary" onclick="preview()">Preview</button>
      <button class="primary" onclick="createPDF()">Apply</button>
    </div>

    <div class="preview-box">
      <canvas id="preview"></canvas>
    </div>

    <p id="status"></p>

    <a class="back" href="../index.html">← Home</a>
  </div>

</div>

<script>
async function preview(){
  const file=document.getElementById("file").files[0];
  if(!file) return alert("Select PDF");

  const pdf=await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
  const page=await pdf.getPage(1);

  const viewport=page.getViewport({scale:1.5});

  const canvas=document.getElementById("preview");
  const ctx=canvas.getContext("2d");

  canvas.width=viewport.width;
  canvas.height=viewport.height;

  await page.render({canvasContext:ctx,viewport}).promise;

  document.getElementById("status").innerText="Preview ready";
}

async function createPDF(){
  const file=document.getElementById("file").files[0];
  if(!file) return alert("Select PDF");

  const pdfDoc=await PDFLib.PDFDocument.load(await file.arrayBuffer());
  const pages=pdfDoc.getPages();

  const text=document.getElementById("text").value || "WATERMARK";

  pages.forEach(p=>{
    const {width,height}=p.getSize();
    p.drawText(text,{
      x:width/2,
      y:height/2,
      size:40,
      opacity:0.3,
      rotate:PDFLib.degrees(45),
      color:PDFLib.rgb(0.5,0.5,0.5)
    });
  });

  const bytes=await pdfDoc.save();

  const blob=new Blob([bytes],{type:"application/pdf"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="watermark.pdf";
  a.click();
}
</script>

</body>
</html>
