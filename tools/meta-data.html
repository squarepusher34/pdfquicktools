<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15172b" />

    <title>PDF Bilgilerini Düzenle - PDFQuickTools</title>
    <meta name="description" content="PDF dosyalarınızın başlık, yazar ve anahtar kelimeler gibi meta verilerini tarayıcınızda güvenle düzenleyin." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6722827238956891"
      crossorigin="anonymous"
    ></script>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
      /* ---------- tokens ---------- */
      :root {
        --ink: #15172b;
        --paper: #faf7f2;
        --card: #ffffff;
        --coral: #ff5a4e;
        --coral-deep: #df4538;
        --blue: #3b6fed;
        --amber: #f2a93b;
        --amber-deep: #c97f12;
        --muted: #716c63;
        --border: #e8e2d8;
        --green: #1f9d6b;

        --display: "Fraunces", serif;
        --body: "Inter", system-ui, sans-serif;
        --mono: "IBM Plex Mono", monospace;

        --container: 560px;
        --shadow-soft: 0 10px 28px -14px rgba(21, 23, 43, 0.16);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--body);
        background: var(--paper);
        background-image: radial-gradient(circle at 1px 1px, rgba(21, 23, 43, 0.05) 1px, transparent 0);
        background-size: 16px 16px;
        color: var(--ink);
        line-height: 1.6;
      }
      a { color: inherit; text-decoration: none; }

      /* ---------- header (boşluklar daraltıldı) ---------- */
      header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(21, 23, 43, 0.94);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .header-inner {
        max-width: 1180px;
        margin: 0 auto;
        padding: 8px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .brand { display: flex; align-items: center; gap: 10px; font-family: var(--display); font-weight: 600; font-size: 18px; color: #fff; }
      .brand-mark {
        font-family: var(--mono); font-size: 10px; font-weight: 600; color: #fff;
        background: linear-gradient(160deg, var(--coral), var(--coral-deep));
        padding: 6px 7px 5px; border-radius: 5px;
        clip-path: polygon(0 0, 75% 0, 100% 35%, 100% 100%, 0 100%);
      }
      .nav-links a { color: rgba(255, 255, 255, 0.82); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; }

      /* ---------- ad block ---------- */
      .ad-block {
        max-width: 1180px;
        margin: 4px auto 0;
        padding-inline: 24px;
        text-align: center;
      }

      /* ---------- main container ---------- */
      .container { max-width: var(--container); margin: 8px auto 40px; padding-inline: 24px; }
      .ticket {
        position: relative; background: var(--card); border-radius: 0 0 10px 10px; padding: 20px 24px 24px; box-shadow: var(--shadow-soft);
        clip-path: polygon(
          0% 0%, 100% 0%, 100% 98%, 96% 100%, 92% 98%, 88% 100%, 84% 98%, 80% 100%, 
          76% 98%, 72% 100%, 68% 98%, 64% 100%, 60% 98%, 56% 100%, 52% 98%, 48% 100%, 
          44% 98%, 40% 100%, 36% 98%, 32% 100%, 28% 98%, 24% 100%, 20% 98%, 16% 100%, 
          12% 98%, 8% 100%, 4% 98%, 0% 100%
        );
      }

      .eyebrow { font-family: var(--mono); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--blue); margin: 0 0 6px; text-align: center; }
      h1 { font-family: var(--display); font-weight: 600; font-size: clamp(1.4rem, 4vw, 1.8rem); margin: 0 0 4px; text-align: center; }
      .lede { color: var(--muted); font-size: 0.9rem; margin: 0 0 16px; text-align: center; }

      .file-input-wrapper { position: relative; margin-bottom: 16px; }
      input[type="file"] { width: 100%; padding: 20px 16px; border: 2px dashed var(--border); border-radius: 12px; background: var(--paper); cursor: pointer; }

      /* ---------- metadata form ---------- */
      .metadata-form {
        display: none; background: var(--paper); padding: 16px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 16px;
      }
      .form-group { margin-bottom: 12px; }
      .form-group:last-child { margin-bottom: 0; }
      label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--ink); }
      input[type="text"] {
        width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--body); font-size: 14px; box-sizing: border-box;
      }
      input[type="text"]:focus { outline: none; border-color: var(--blue); }

      button { width: 100%; padding: 14px; background: linear-gradient(160deg, var(--coral), var(--coral-deep)); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }

      .perforation { height: 3px; margin: 16px 0 12px; background-image: radial-gradient(circle, var(--paper) 1.6px, transparent 1.7px); background-size: 11px 100%; background-repeat: repeat-x; }
      .note { font-size: 12px; color: var(--muted); text-align: center; margin: 0 0 12px; }
      .back { display: inline-flex; align-items: center; justify-content: center; width: 100%; font-size: 13px; color: var(--muted); }
      #status { margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--amber-deep); text-align: center; min-height: 18px; }
      
      a#download {
        display: none; margin-top: 8px; padding: 12px; border-radius: 12px; background: rgba(31, 157, 107, 0.1); border: 1px solid rgba(31, 157, 107, 0.3);
        color: var(--green); font-weight: 600; text-align: center; cursor: pointer;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-inner">
        <a href="../index.html" class="brand">
          <span class="brand-mark">PDF</span> PDFQuickTools
        </a>
        <div class="nav-links">
          <a href="../index.html">Ana Sayfa</a>
        </div>
      </div>
    </header>

    <div class="ad-block">
      <ins
        class="adsbygoogle"
        style="display: block"
        data-ad-client="ca-pub-6722827238956891"
        data-ad-slot="2222222222"
        data-ad-format="auto"
      ></ins>
    </div>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <div class="container">
      <div class="ticket">
        <div class="eyebrow">PDF ARAÇLARI</div>
        <h1>PDF Bilgilerini Düzenle</h1>
        <p class="lede">PDF dosyasının başlık, yazar, konu ve anahtar kelimelerini güncelleyin veya tamamen temizleyin.</p>

        <div class="file-input-wrapper">
          <input type="file" id="file" accept="application/pdf" />
        </div>

        <div id="metadataForm" class="metadata-form">
          <div class="form-group">
            <label for="pdfTitle">Başlık (Title)</label>
            <input type="text" id="pdfTitle" placeholder="Örn: Yıllık Rapor" />
          </div>
          <div class="form-group">
            <label for="pdfAuthor">Yazar (Author)</label>
            <input type="text" id="pdfAuthor" placeholder="Örn: Şirket Adı veya İsim" />
          </div>
          <div class="form-group">
            <label for="pdfSubject">Konu (Subject)</label>
            <input type="text" id="pdfSubject" placeholder="Örn: Finansal Özet" />
          </div>
          <div class="form-group">
            <label for="pdfKeywords">Anahtar Kelimeler (Keywords)</label>
            <input type="text" id="pdfKeywords" placeholder="Örn: pdf, rapor, 2026 (virgülle ayırın)" />
          </div>
        </div>

        <button id="saveBtn" onclick="updateMetadata()" style="display: none;">Meta Verileri Güncelle ve Kaydet</button>

        <div id="status"></div>
        <a id="download">Düzenlenmiş PDF'i İndir ✔</a>

        <div class="perforation"></div>
        <p class="note">Meta veriler tamamen cihazınızda işlenir; dosyanız asla sunucuya yüklenmez.</p>
        <a class="back" href="../index.html">← Ana Sayfa</a>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("file");
      const metadataForm = document.getElementById("metadataForm");
      const saveBtn = document.getElementById("saveBtn");
      const downloadLink = document.getElementById("download");

      // Form elemanları
      const titleInput = document.getElementById("pdfTitle");
      const authorInput = document.getElementById("pdfAuthor");
      const subjectInput = document.getElementById("pdfSubject");
      const keywordsInput = document.getElementById("pdfKeywords");

      let activeFileBuffer = null;
      let activeFileName = "";

      fileInput.addEventListener("change", async () => {
        const files = fileInput.files;
        if (!files || files.length === 0) return;

        const file = files[0];
        activeFileName = file.name;
        setStatus("PDF okunuyor ve meta veriler çözümleniyor...");

        const reader = new FileReader();
        reader.onload = async function(e) {
          activeFileBuffer = e.target.result;
          try {
            // pdf-lib ile mevcut meta verileri çekip form alanlarına dolduruyoruz
            const pdfDoc = await PDFLib.PDFDocument.load(activeFileBuffer);
            
            titleInput.value = pdfDoc.getTitle() || "";
            authorInput.value = pdfDoc.getAuthor() || "";
            subjectInput.value = pdfDoc.getSubject() || "";
            
            const keywordsArray = pdfDoc.getKeywords();
            keywordsInput.value = keywordsArray ? keywordsArray : "";

            metadataForm.style.display = "block";
            saveBtn.style.display = "block";
            downloadLink.style.display = "none";
            setStatus(`Dosya yüklendi: ${activeFileName}`);
          } catch (err) {
            console.error(err);
            setStatus("PDF okunurken bir hata oluştu. Dosya şifreli olabilir.");
          }
        };
        reader.readAsArrayBuffer(file);
      });

      function setStatus(t) {
        document.getElementById("status").innerText = t;
      }

      async function updateMetadata() {
        if (!activeFileBuffer) return;

        saveBtn.disabled = true;
        downloadLink.style.display = "none";
        setStatus("Yeni meta veriler PDF kataloğuna güvenli bir şekilde yazılıyor...");

        try {
          // pdf-lib'in kararlı katalog yazma metotları
          const pdfDoc = await PDFLib.PDFDocument.load(activeFileBuffer);

          // Formdan alınan değerleri doğrudan nesneye setliyoruz
          pdfDoc.setTitle(titleInput.value.trim());
          pdfDoc.setAuthor(authorInput.value.trim());
          pdfDoc.setSubject(subjectInput.value.trim());
          
          // Anahtar kelimeleri string olarak setleme
          pdfDoc.setKeywords(keywordsInput.value.split(',').map(k => k.trim()).filter(k => k !== ""));

          // Değişiklikleri binary yapıyı bozmadan kaydetme
          const pdfBytes = await pdfDoc.save();
          const blob = new Blob([pdfBytes], { type: "application/pdf" });
          const url = URL.createObjectURL(blob);

          const dotIdx = activeFileName.lastIndexOf('.');
          const baseName = dotIdx !== -1 ? activeFileName.substring(0, dotIdx) : activeFileName;

          downloadLink.href = url;
          downloadLink.download = `${baseName}_edited.pdf`;
          downloadLink.style.display = "block";
          setStatus("Meta veriler başarıyla güncellendi ✔");
        } catch (err) {
          console.error(err);
          setStatus("Meta veriler kaydedilirken bir hata oluştu.");
        }
        saveBtn.disabled = false;
      }
    </script>
  </body>
</html>
