body{

}

.lang-btn:hover{

  transform:scale(1.05);
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px 20px;
}

.hero h1{
  font-size:34px;
  margin:0;
}

.hero p{
  color:var(--muted);
  max-width:650px;
  margin:10px auto 0;
  line-height:1.6;
}

/* LINKS */
.links{
  text-align:center;
  margin:25px 0;
}

.links a{
  margin:0 6px;
  color:var(--primary);
  text-decoration:none;
  font-weight:600;
  font-size:14px;
}

/* GRID */
.container{
  max-width:1000px;
  margin:30px auto;
  padding:0 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  border:1px solid #eef0f5;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.card h2{
  margin:0 0 6px;
  font-size:18px;
}

.card p{
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

.card a{
  display:inline-block;
  margin-top:10px;
  padding:8px 12px;
  background:var(--primary);
  color:white;
  border-radius:8px;
  text-decoration:none;
  font-size:13px;
}

/* SECTIONS */
section{

  margin-top:25px;
  padding:22px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.04);
  color:#374151;
}

/* FAQ */

  background:#f9fafb;
  padding:10px;
  border-radius:8px;
}

summary{
  cursor:pointer;
  font-weight:600;
}

/* FOOTER */
footer{

  padding:25px;
  color:#6b7280;
}

footer a{

  margin:0 8px;
  text-decoration:none;

<script>
function detectLang(){
  const lang = navigator.language || navigator.userLanguage;
  const isEN = lang.startsWith("en");

  document.querySelectorAll("[data-tr]").forEach(el=>{
    el.innerHTML = isEN ? el.dataset.en : el.dataset.tr;
  });
}
detectLang();
</script>
